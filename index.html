<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thayara Alencar - Personal Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d0f14;--card:#171b24;--card2:#202637;--txt:#f6f3ef;--mut:#aab0bf;--line:#30384c;--acc:#f2b84b;--green:#1d8f50;--green2:#1d8f50;--greenLight:#b9f6cf;--red:#ff6464;--blue:#b9f6cf}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0d0f14,#121722);color:var(--txt);font-family:Arial,Helvetica,sans-serif}.hidden{display:none!important}
header{position:sticky;top:0;z-index:5;background:rgba(13,15,20,.97);border-bottom:1px solid var(--line);padding:12px 14px;text-align:center}.logo{width:96px;height:96px;object-fit:contain;border-radius:22px;background:#f7f5f0;margin:0 auto 8px;display:block;border:1px solid rgba(242,184,75,.25)}h1{margin:0;font-size:21px;color:var(--acc);letter-spacing:.8px}.sub{margin-top:4px;color:var(--mut);font-size:13px;text-transform:uppercase;letter-spacing:4px}
main{max-width:980px;margin:0 auto;padding:14px}.tabs{position:sticky;top:160px;z-index:4;background:rgba(13,15,20,.96);display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px 0;margin-bottom:12px}.tab{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:14px;padding:12px 8px;font-weight:800;font-size:12px;cursor:pointer}.tab.active{background:var(--acc);color:#16110a;border-color:var(--acc)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title{font-weight:900;font-size:17px}.mut{color:var(--mut);font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:7px 10px;font-size:12px;color:var(--mut)}
button,input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:var(--card2);color:var(--txt);padding:11px;font-size:15px}button{background:var(--acc);color:#16110a;border:none;font-weight:900;cursor:pointer}.secondary{background:var(--card2);color:var(--txt);border:1px solid var(--line)}.doneBtn{background:var(--greenLight);color:#093d20}.doneBtn.checked{background:var(--green2);color:white}.danger{background:var(--red);color:white}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.done{opacity:.72}.done .title{text-decoration:line-through}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:10px}label{display:block;color:var(--mut);font-size:12px;margin:0 0 5px 2px}.sectionTitle{font-size:18px;font-weight:900;margin:4px 0 12px;color:var(--acc)}
.topLine,.calendarHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.dayNav,.monthNav{display:flex;gap:7px}.dayNav button,.monthNav button{padding:8px 10px;font-size:12px;white-space:nowrap}.studentGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stat{background:#11151f;border:1px solid var(--line);border-radius:14px;padding:10px}.stat.click{cursor:pointer}.stat.click:hover{border-color:var(--acc)}.stat b{display:block;font-size:16px}.bar{height:8px;background:#10141d;border-radius:99px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--green))}
.payRow{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.payRow button{width:auto;min-width:150px}.swipeArea{touch-action:pan-y;user-select:none}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.dow,.day{min-height:48px;border-radius:13px;border:1px solid var(--line);background:#11151f;padding:7px;font-size:12px}.dow{min-height:auto;text-align:center;color:var(--mut);background:transparent;border:none;font-weight:900}.day{cursor:pointer}.day:hover{border-color:var(--acc)}.dayNum{font-weight:900}.dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.dot{width:9px;height:9px;border-radius:50%;display:inline-block}.green{background:var(--green)}.red{background:var(--red)}.blue{background:var(--blue)}.money{font-size:24px;font-weight:900}.money.good{color:var(--green)}.money.warn{color:var(--acc)}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.weekBtns{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.weekBtns button{font-size:12px;padding:9px 4px;background:var(--card2);color:var(--mut);border:1px solid var(--line)}.weekBtns button.on{background:var(--acc);color:#16110a}.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:flex;align-items:flex-end;justify-content:center;z-index:20;padding:14px}.modalBox{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px}.infoList{line-height:1.55;white-space:pre-wrap}.lockScreen{position:fixed;inset:0;background:linear-gradient(180deg,#0d0f14,#121722);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px}.lockBox{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,.35)}.lockBox img{width:120px;height:120px;object-fit:contain;border-radius:24px;background:#f7f5f0;margin:0 auto 10px;display:block}.lockBox h2{margin:6px 0 4px;color:var(--acc)}.lockError{min-height:18px;color:var(--red);font-size:13px;margin-top:8px}.loading{padding:18px;color:var(--mut);text-align:center}.swipeHint{color:var(--mut);font-size:12px;margin-top:-6px;margin-bottom:10px;text-align:center}
@media(max-width:760px){.logo{width:82px;height:82px}.tabs{grid-template-columns:1fr 1fr;top:142px}.studentGrid,.formGrid{grid-template-columns:1fr}.statGrid{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.payRow{grid-template-columns:1fr}.payRow button{width:100%}.cal{gap:5px}.day{min-height:44px;padding:6px}.weekBtns{grid-template-columns:repeat(4,1fr)}.topLine,.calendarHead{align-items:flex-start;flex-direction:column}.dayNav,.monthNav{width:100%}}
</style>
</head>
<body>
<div id="lockScreen" class="lockScreen"><div class="lockBox"><img src="assets/logo-thayara.jpg" alt="Thayara"><h2>THAYARA ALENCAR</h2><div class="mut">Personal Trainer</div><br><label>Senha</label><input id="senhaEntrada" type="password" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') entrarPainel()"><br><br><button onclick="entrarPainel()">Entrar</button><div id="lockError" class="lockError"></div></div></div>
<header><img class="logo" src="assets/logo-thayara.jpg" alt="Thayara Alencar"><h1>THAYARA ALENCAR</h1><div class="sub">Personal Trainer</div></header>
<main>
<nav class="tabs"><button class="tab active" data-tab="aulas" onclick="showTab('aulas')">AULAS DO DIA</button><button class="tab" data-tab="alunos" onclick="showTab('alunos')">RESUMO DOS ALUNOS</button><button class="tab" data-tab="calendario" onclick="showTab('calendario')">CALENDÁRIO</button><button class="tab" data-tab="financeiro" onclick="showTab('financeiro')">FINANCEIRO</button><button class="tab" data-tab="cadastro" onclick="showTab('cadastro')">CADASTRAR ALUNO</button><button class="tab" data-tab="ajustes" onclick="showTab('ajustes')">AJUSTE DE HORÁRIOS</button></nav>
<div id="globalStatus" class="loading">Carregando dados...</div>
<section id="aulas"></section><section id="alunos" class="hidden"></section><section id="calendario" class="hidden"></section><section id="financeiro" class="hidden"></section><section id="cadastro" class="hidden"></section><section id="ajustes" class="hidden"></section>
</main>
<div id="modal" class="modal hidden"><div class="modalBox" id="modalBox"></div></div>
<script>
const SENHA_PAINEL='THAY123';
const SUPABASE_URL='https://eioishjujhvhawisdkrt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpb2lzaGp1amh2aGF3aXNka3J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDIyNTksImV4cCI6MjA5NDM3ODI1OX0.-zIiisfj68EOx5_1EIT2OF6CsPxWJ-H64czv4aQXJdo';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let alunos=[],aulas=[],pagamentos=[],abaAtual='aulas',dataAulas=hojeISO(),mesResumo=hojeISO().slice(0,7),mesCalendario=hojeISO().slice(0,7),mesFinanceiro=hojeISO().slice(0,7),mesCadastro=hojeISO().slice(0,7),mesAjuste=hojeISO().slice(0,7),remarcando=null,swipeStartX=0,swipeMoved=false,swipeFinanceStartX=0,swipeCadastroStartX=0,swipeAjusteStartX=0,cadastroAjustes={},ajusteAjustes={};
const nomesMes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function entrarPainel(){const v=(document.getElementById('senhaEntrada')?.value||'').trim();if(v===SENHA_PAINEL){document.getElementById('lockScreen').classList.add('hidden');return}document.getElementById('lockError').textContent='Senha incorreta.'}
function checarSenha(){document.getElementById('lockScreen').classList.remove('hidden')}
function hojeISO(){const d=new Date();return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Fortaleza',year:'numeric',month:'2-digit',day:'2-digit'}).format(d)}
function fmtData(iso){if(!iso)return'';const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`}
function tituloDia(iso){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d,12));const semana=new Intl.DateTimeFormat('pt-BR',{weekday:'long',timeZone:'UTC'}).format(dt);return `${String(d).padStart(2,'0')}/${nomesMes[m-1]} ${semana.charAt(0).toUpperCase()+semana.slice(1)}`}
function addDays(iso,n){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d+n,12));return dt.toISOString().slice(0,10)}
function addHour(h){let [hh,mm]=String(h||'07:00').slice(0,5).split(':').map(Number);hh=(hh+1)%24;return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}
function monthAdd(mes,n){const [y,m]=mes.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1+n,1,12));return dt.toISOString().slice(0,7)}
function statusCor(s){return s==='dada'?'green':(s==='remarcada'||s==='perdida'||s==='cancelada')?'red':'blue'}
function alunoNome(id){return alunos.find(a=>a.id===id)?.nome||''}
function closeModal(){modal.classList.add('hidden');modalBox.innerHTML=''}
function modalHtml(html){modalBox.innerHTML=html;modal.classList.remove('hidden')}
function showTab(id){abaAtual=id;document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));renderAll()}
async function carregarDados(){globalStatus.textContent='Carregando dados...';const [ra,ru,rp]=await Promise.all([sb.from('alunos').select('*,locais(nome)').order('nome'),sb.from('aulas').select('*').order('data_aula'),sb.from('pagamentos').select('*').order('data_vencimento')]);if(ra.error||ru.error||rp.error){globalStatus.textContent='Erro ao carregar dados do Supabase.';console.error(ra.error||ru.error||rp.error);return}alunos=ra.data||[];aulas=ru.data||[];pagamentos=rp.data||[];globalStatus.classList.add('hidden');renderAll()}
function renderAll(){renderAulas();renderAlunos();renderCalendario();renderFinanceiro();renderCadastro();renderAjustes()}
function localAula(a){return a.local_nome||alunos.find(x=>x.id===a.aluno_id)?.locais?.nome||'A definir'}
function renderAulas(){const lista=aulas.filter(a=>a.data_aula===dataAulas).sort((a,b)=>String(a.hora_inicio).localeCompare(String(b.hora_inicio)));const el=document.getElementById('aulas');const futuro=dataAulas>hojeISO();el.innerHTML=`<div class="topLine"><div class="sectionTitle">Aulas do dia — ${tituloDia(dataAulas)}</div><div class="dayNav"><button class="secondary" onclick="dataAulas=addDays(dataAulas,-1);renderAulas()">← Dia anterior</button><button class="secondary" onclick="dataAulas=addDays(dataAulas,1);renderAulas()">Próximo dia →</button></div></div>${futuro?'<div class="card mut">Dia futuro: por segurança, só é possível remarcar. Marcar como aula dada fica bloqueado até chegar o dia.</div>':''}`+(lista.length?lista.map(a=>{const botaoDada=(futuro&&a.status!=='dada')?'':`<button class="doneBtn ${a.status==='dada'?'checked':''}" onclick="toggleAulaDada('${a.id}')">${a.status==='dada'?'↩ Desmarcar aula dada':'✓ Aula dada'}</button>`;return `<div class="card ${a.status==='dada'?'done':''}"><div class="row"><div><div class="title">${alunoNome(a.aluno_id)}</div><div class="mut">de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)}</div><div class="mut">Local: ${localAula(a)}</div>${a.status==='remarcada'?`<div class="pill">Remarcada: ${a.motivo||''}</div>`:''}</div><span class="pill">${String(a.status).toUpperCase()}</span></div><div class="actions">${botaoDada}<button class="secondary" onclick="openRemarcar('${a.id}')">Remarcar</button></div></div>`}).join(''):`<div class="card mut">Nenhuma aula cadastrada para este dia.</div>`)}
async function toggleAulaDada(id){const aula=aulas.find(x=>x.id===id);if(!aula)return;if(String(aula.data_aula)>hojeISO()&&aula.status!=='dada')return alert('Aulas futuras não podem ser marcadas como dadas. Use remarcar.');const novo=aula.status==='dada'?'pendente':'dada';await sb.from('aulas').update({status:novo,motivo:null}).eq('id',id);await carregarDados()}
function openRemarcar(id){remarcando=aulas.find(a=>a.id===id);if(!remarcando)return;modalHtml(`<div class="sectionTitle">Remarcar aula</div><div class="mut">${alunoNome(remarcando.aluno_id)} — ${fmtData(remarcando.data_aula)} de ${String(remarcando.hora_inicio).slice(0,5)} às ${String(remarcando.hora_fim).slice(0,5)}</div><br><div class="grid"><div class="field"><label>Novo dia</label><input type="date" id="novaData" value="${remarcando.data_aula}"></div><div class="field"><label>Novo horário</label><input type="time" id="novaHora" value="${String(remarcando.hora_inicio).slice(0,5)}"></div></div><div class="field"><label>Motivo</label><textarea id="motivo" rows="3"></textarea></div><div class="actions"><button class="secondary" onclick="closeModal()">Cancelar</button><button onclick="confirmarRemarcacao()">Salvar remarcação</button></div>`)}
async function confirmarRemarcacao(){if(!remarcando)return;const motivo=document.getElementById('motivo').value.trim()||'Sem motivo informado';const nd=document.getElementById('novaData').value,nh=document.getElementById('novaHora').value;await sb.from('aulas').update({status:'remarcada',motivo,remarcada_para_data:nd,remarcada_para_hora:nh}).eq('id',remarcando.id);await sb.from('aulas').insert({aluno_id:remarcando.aluno_id,data_aula:nd,hora_inicio:nh,hora_fim:addHour(nh),status:'pendente',local_id:remarcando.local_id});await sb.from('remarcacoes').insert({aula_id:remarcando.id,aluno_id:remarcando.aluno_id,data_original:remarcando.data_aula,hora_original:remarcando.hora_inicio,nova_data:nd,nova_hora:nh,motivo});closeModal();await carregarDados()}

function fimMes(mes){const [y,m]=mes.split('-').map(Number);return new Date(Date.UTC(y,m,0,12)).toISOString().slice(0,10)}
function pagamentoValor(p){return p?`R$ ${Number(p.valor||0).toLocaleString('pt-BR')}`:'-' }
function planoAtualAluno(alunoId){
 const a=alunos.find(x=>x.id===alunoId)||{};
 const limite=fimMes(mesResumo);
 const ps=pagamentos.filter(p=>p.aluno_id===alunoId).sort((x,y)=>String(x.data_inicio_plano||x.data_vencimento).localeCompare(String(y.data_inicio_plano||y.data_vencimento)));
 let pagamento=[...ps].reverse().find(p=>String(p.data_inicio_plano||p.data_vencimento)<=limite)||ps[ps.length-1]||null;
 const inicio=pagamento?.data_inicio_plano||pagamento?.data_vencimento||mesResumo+'-01';
 const proximo=ps.find(p=>String(p.data_inicio_plano||p.data_vencimento)>String(inicio))||null;
 const fim=proximo?.data_inicio_plano||proximo?.data_vencimento||'9999-12-31';
 const planoQtd=Number(pagamento?.quantidade_aulas||a.quantidade_aulas_plano||8);
 const au=aulas.filter(x=>x.aluno_id===alunoId&&String(x.data_aula||'')>=String(inicio)&&String(x.data_aula||'')<String(fim)).sort((x,y)=>String(x.data_aula).localeCompare(String(y.data_aula))||String(x.hora_inicio).localeCompare(String(y.hora_inicio)));
 const feitas=au.filter(x=>x.status==='dada');
 const faltasRegistradas=au.filter(x=>x.status!=='dada');
 const faltamQtd=Math.max(0,planoQtd-feitas.length);
 const mes=inicio.slice(0,7);
 const tipo=pagamento?.tipo_cobranca==='aula'?'Avulso':'Pacote';
 return {aluno:a,pagamento,proximo,mes,mesNome:`${tipo} iniciado em ${fmtData(inicio)}`,planoQtd,au,feitas,faltasRegistradas,faltamQtd,inicio,fim};
}
function diaSemanaExt(iso){const [y,m,d]=iso.split('-').map(Number);return new Intl.DateTimeFormat('pt-BR',{weekday:'long',timeZone:'UTC'}).format(new Date(Date.UTC(y,m-1,d,12)))}
function listaAulasDetalhe(list){return list.length?list.map(x=>`- ${fmtData(x.data_aula)} (${diaSemanaExt(x.data_aula)}) ${String(x.hora_inicio).slice(0,5)} — ${String(x.status).toUpperCase()}${x.motivo?' | '+x.motivo:''}`).join('\n'):'Nenhuma aula registrada.'}
function diasSemanaAluno(pl){
 const map=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
 const ordem=[1,2,3,4,5,6,0];
 const diasAulas=[...new Set(pl.au.map(x=>new Date(`${x.data_aula}T12:00:00`).getDay()))];
 const dias=diasAulas.length?diasAulas:(pl.aluno.dias_semana||[]).map(Number);
 return ordem.filter(d=>dias.includes(d)).map(d=>map[d]).join(', ')||'Ainda não definido.';
}
function detalheAluno(id){const pl=planoAtualAluno(id);modalHtml(`<div class="sectionTitle">${pl.aluno.nome}</div><div class="infoList">Plano referência: ${pl.mesNome}\nPlano: ${pl.planoQtd} aulas\nÚltimo pagamento: ${fmtData(pl.pagamento?.data_recebimento||pl.pagamento?.data_vencimento)||'-'} — ${pagamentoValor(pl.pagamento)}\nFrequência: ${pl.aluno.frequencia_semanal||0}x semana\nDias: ${diasSemanaAluno(pl)}\nAulas dadas no plano: ${pl.feitas.length}\nAulas faltantes no plano: ${pl.faltamQtd}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function detalheResumo(id,tipo){const pl=planoAtualAluno(id);let titulo='',body='';
 if(tipo==='ultimo'){titulo='Último pagamento';body=`Data: ${fmtData(pl.pagamento?.data_recebimento||pl.pagamento?.data_vencimento)||'-'}\nValor: ${pagamentoValor(pl.pagamento)}\nStatus: ${pl.pagamento?.status||'-'}`}
 if(tipo==='plano'){titulo='Dias do plano';body=`Plano referência: ${pl.mesNome}\nQuantidade contratada: ${pl.planoQtd} aulas\n\n${listaAulasDetalhe(pl.au)}`}
 if(tipo==='freq'){titulo='Frequência semanal';body=`${pl.aluno.frequencia_semanal||0}x semana\nDias da semana: ${diasSemanaAluno(pl)}`}
 if(tipo==='feitas'){titulo='Aulas já feitas';body=listaAulasDetalhe(pl.feitas)}
 if(tipo==='faltam'){titulo='Aulas que faltam';const faltas=pl.faltasRegistradas;body=(faltas.length?listaAulasDetalhe(faltas)+'\n':'')+(pl.faltamQtd>faltas.length?`\n${pl.faltamQtd-faltas.length} aula(s) ainda sem data definida neste plano.`:'')||'Nada faltando neste plano.'}
 if(tipo==='proximo'){titulo='Próximo pagamento';body=`Data: ${fmtData(pl.proximo?.data_vencimento)||'-'}\nValor: ${pagamentoValor(pl.proximo)}\nStatus: ${pl.proximo?.status||'-'}`}
 modalHtml(`<div class="sectionTitle">${titulo} — ${pl.aluno.nome}</div><div class="infoList">${body}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)
}

function renderAlunos(){const el=document.getElementById('alunos');const mesNome=`${nomesMes[Number(mesResumo.slice(5))-1].toUpperCase()} ${mesResumo.slice(0,4)}`;el.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Resumo dos alunos — ${mesNome}</div><div class="monthNav"><button class="secondary" onclick="mesResumo=monthAdd(mesResumo,-1);renderAlunos()">← Mês anterior</button><button class="secondary" onclick="mesResumo=monthAdd(mesResumo,1);renderAlunos()">Próximo mês →</button></div></div><div class="studentGrid">`+alunos.map(a=>{const pl=planoAtualAluno(a.id);const feitas=pl.feitas.length;const faltam=pl.faltamQtd;return `<div class="card"><div class="title" onclick="detalheAluno('${a.id}')" style="cursor:pointer">${a.nome}</div><div class="mut">${a.locais?.nome||'A definir'} · Plano referência: ${pl.mesNome}</div><div class="statGrid"><div class="stat click" onclick="detalheResumo('${a.id}','ultimo')"><span class="mut">Último pagamento</span><b>${fmtData(pl.pagamento?.data_recebimento||pl.pagamento?.data_vencimento)||'-'}</b></div><div class="stat click" onclick="detalheResumo('${a.id}','plano')"><span class="mut">Plano</span><b>${pl.planoQtd} aulas</b></div><div class="stat click" onclick="detalheResumo('${a.id}','freq')"><span class="mut">Frequência</span><b>${a.frequencia_semanal||0}x semana</b></div><div class="stat click" onclick="detalheResumo('${a.id}','feitas')"><span class="mut">Já foram no plano</span><b>${feitas}</b></div><div class="stat click" onclick="detalheResumo('${a.id}','faltam')"><span class="mut">Faltam no plano</span><b>${faltam}</b></div><div class="stat click" onclick="detalheResumo('${a.id}','proximo')"><span class="mut">Próx. pagamento</span><b>${fmtData(pl.proximo?.data_vencimento)||'-'}</b></div></div><div class="bar"><span style="width:${pl.planoQtd?Math.min(100,Math.round((feitas/pl.planoQtd)*100)):0}%"></span></div></div>`}).join('')+`</div>`}
function renderCalendario(){const el=document.getElementById('calendario');const atual=document.getElementById('selAluno')?.value||alunos[0]?.id||'';el.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Calendário do aluno</div></div><div class="card"><label>Selecionar aluno</label><select id="selAluno" onchange="renderCalendario()">${alunos.map(a=>`<option value="${a.id}" ${atual===a.id?'selected':''}>${a.nome}</option>`).join('')}</select></div><div class="swipeHint">Arraste o calendário para os lados para mudar de mês</div>${calendarHtml({alunoId:atual,tipo:'student',mes:mesCalendario})}`}
function calendarHtml({alunoId='',tipo='student',mes=mesCalendario}={}){const [yy,mm]=mes.split('-').map(Number);const days=new Date(yy,mm,0).getDate();const first=new Date(`${mes}-01T12:00:00`).getDay();const names=['D','S','T','Q','Q','S','S'];const legenda=tipo==='finance'?'<span class="pill"><i class="dot green"></i>Recebido</span> <span class="pill"><i class="dot red"></i>A receber</span>':'<span class="pill"><i class="dot green"></i>Dada</span> <span class="pill"><i class="dot red"></i>Remarcada/perdida</span> <span class="pill"><i class="dot blue"></i>Pendente</span>';const swipeAttr=tipo==='student'?' onpointerdown="swipeStart(event)" onpointerup="swipeEnd(event)" onpointercancel="swipeCancel()" ontouchstart="swipeStart(event)" ontouchend="swipeEnd(event)"':tipo==='finance'?' onpointerdown="swipeFinanceStart(event)" onpointerup="swipeFinanceEnd(event)" onpointercancel="swipeFinanceCancel()" ontouchstart="swipeFinanceStart(event)" ontouchend="swipeFinanceEnd(event)"':'';let html=`<div class="card swipeArea"${swipeAttr}><div class="calendarHead"><div class="title">${nomesMes[mm-1].toUpperCase()} ${yy}</div><div>${legenda}</div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${mes}-${String(d).padStart(2,'0')}`;let dots=[];if(tipo==='student'){dots=aulas.filter(a=>a.aluno_id===alunoId&&a.data_aula===date).map(a=>statusCor(a.status))}else{dots=pagamentos.filter(p=>(p.data_recebimento||p.data_vencimento)===date || p.data_vencimento===date).map(p=>p.status==='recebido'?'green':'red')}html+=`<div class="day" onclick="${tipo==='student'?`clickDiaAluno('${date}','${alunoId}')`:`clickDiaFinanceiro('${date}')`}"><div class="dayNum">${d}</div><div class="dots">${dots.map(c=>`<span class="dot ${c}"></span>`).join('')}</div></div>`}return html+'</div></div>'}
function swipeX(ev){return ev.changedTouches?.[0]?.clientX||ev.touches?.[0]?.clientX||ev.clientX||0}
function swipeStart(ev){swipeStartX=swipeX(ev);swipeMoved=false}
function swipeCancel(){swipeStartX=0}
function swipeEnd(ev){const dx=swipeX(ev)-swipeStartX;if(Math.abs(dx)>65){swipeMoved=true;mesCalendario=monthAdd(mesCalendario,dx>0?-1:1);renderCalendario();setTimeout(()=>swipeMoved=false,250)}swipeStartX=0}
function swipeFinanceStart(ev){swipeFinanceStartX=swipeX(ev);swipeMoved=false}
function swipeFinanceCancel(){swipeFinanceStartX=0}
function swipeFinanceEnd(ev){const dx=swipeX(ev)-swipeFinanceStartX;if(Math.abs(dx)>65){swipeMoved=true;mesFinanceiro=monthAdd(mesFinanceiro,dx>0?-1:1);renderFinanceiro();setTimeout(()=>swipeMoved=false,250)}swipeFinanceStartX=0}
function clickDiaAluno(date,alunoId){if(swipeMoved)return;const lista=aulas.filter(a=>a.aluno_id===alunoId&&a.data_aula===date);if(!lista.length)return;const pend=lista.find(a=>a.status==='pendente');if(pend){modalHtml(`<div class="sectionTitle">Aula pendente</div><div class="infoList">${alunoNome(pend.aluno_id)}\n${fmtData(pend.data_aula)} de ${String(pend.hora_inicio).slice(0,5)} às ${String(pend.hora_fim).slice(0,5)}</div><br><button onclick="closeModal();openRemarcar('${pend.id}')">Deseja remarcar?</button><br><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}const red=lista.find(a=>a.status==='remarcada'||a.status==='perdida');if(red){modalHtml(`<div class="sectionTitle">Aula remarcada / falta</div><div class="infoList">Aluno: ${alunoNome(red.aluno_id)}\nData original: ${fmtData(red.data_aula)}\nMotivo: ${red.motivo||'Não informado'}\nRemarcada para: ${red.remarcada_para_data?fmtData(red.remarcada_para_data)+' '+String(red.remarcada_para_hora||'').slice(0,5):'Ainda não definida'}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}modalHtml(`<div class="sectionTitle">Aula dada</div><div class="infoList">${lista.map(a=>`${alunoNome(a.aluno_id)} — ${fmtData(a.data_aula)} de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)}`).join('\n')}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function dinheiro(v){return `R$ ${Number(v||0).toLocaleString('pt-BR')}`}
function dataFinanceiro(p){return p.status==='recebido'?(p.data_recebimento||p.data_vencimento):p.data_vencimento}
function pagamentosDoMes(mes=mesFinanceiro){return pagamentos.filter(p=>String(p.data_vencimento||'').startsWith(mes)||String(p.data_recebimento||'').startsWith(mes)).sort((a,b)=>String(dataFinanceiro(a)).localeCompare(String(dataFinanceiro(b)))||alunoNome(a.aluno_id).localeCompare(alunoNome(b.aluno_id)))}
function linhaPagamento(p,comBotao=true){const pago=p.status==='recebido';return `<div class="card payRow"><div><div class="title">${alunoNome(p.aluno_id)||'Aluno não identificado'}</div><div class="mut">${dinheiro(p.valor)} · ${pago?'Pago em':'Vence em'} ${fmtData(dataFinanceiro(p))}</div></div>${comBotao?`<button class="${pago?'secondary':'doneBtn'}" onclick="openPagamento('${p.id}')">${pago?'Desfazer pagamento':'✓ Já pagou'}</button>`:`<span class="pill">${pago?'RECEBIDO':'A RECEBER'}</span>`}</div>`}
function renderFinanceiro(){const el=document.getElementById('financeiro');const rows=pagamentosDoMes();const recebidos=rows.filter(p=>p.status==='recebido');const pendentes=rows.filter(p=>p.status!=='recebido');const recebido=recebidos.reduce((s,p)=>s+Number(p.valor||0),0);const falta=pendentes.reduce((s,p)=>s+Number(p.valor||0),0);el.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Financeiro — ${nomesMes[Number(mesFinanceiro.slice(5))-1].toUpperCase()} ${mesFinanceiro.slice(0,4)}</div></div><div class="studentGrid"><div class="card stat click" onclick="detalheFinanceiro('recebidos')"><div class="mut">Arrecadado no mês</div><div class="money good">${dinheiro(recebido)}</div><div class="mut">${recebidos.length} pagamento(s)</div></div><div class="card stat click" onclick="detalheFinanceiro('pendentes')"><div class="mut">Falta receber</div><div class="money warn">${dinheiro(falta)}</div><div class="mut">${pendentes.length} pagamento(s)</div></div><div class="card"><div class="mut">Previsão total</div><div class="money">${dinheiro(recebido+falta)}</div><div class="mut">Clique nos cards para ver nome, valor e data.</div></div></div><div class="swipeHint">Arraste o calendário financeiro para os lados para mudar de mês</div>${calendarHtml({tipo:'finance',mes:mesFinanceiro})}<div class="card"><div class="sectionTitle">Pagamentos do mês</div><div class="mut">Marque quem já pagou ou desfaça um pagamento lançado errado.</div><br>${rows.length?rows.map(p=>linhaPagamento(p,true)).join(''):'<div class="mut">Nenhum pagamento previsto para este mês.</div>'}</div>`}
function detalheFinanceiro(tipo){const rows=pagamentosDoMes().filter(p=>tipo==='recebidos'?p.status==='recebido':p.status!=='recebido');const titulo=tipo==='recebidos'?'Arrecadado no mês':'Falta receber';modalHtml(`<div class="sectionTitle">${titulo}</div>${rows.length?rows.map(p=>linhaPagamento(p,false)).join(''):'<div class="mut">Nenhum registro.</div>'}<br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function clickDiaFinanceiro(date){if(swipeMoved)return;const rows=pagamentos.filter(p=>(p.data_recebimento||p.data_vencimento)===date||p.data_vencimento===date).sort((a,b)=>alunoNome(a.aluno_id).localeCompare(alunoNome(b.aluno_id)));if(!rows.length)return;modalHtml(`<div class="sectionTitle">Pagamentos de ${fmtData(date)}</div>${rows.map(p=>linhaPagamento(p,true)).join('')}<br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function openPagamento(id){const p=pagamentos.find(x=>x.id===id);if(!p)return;if(p.status==='recebido'){desfazerPagamento(id);return}modalHtml(`<div class="sectionTitle">Confirmar pagamento</div><div class="mut">${alunoNome(p.aluno_id)} · ${dinheiro(p.valor)}</div><br><div class="field"><label>Data em que realmente pagou</label><input id="dataPagamento" type="date" value="${p.data_vencimento||hojeISO()}"></div><div class="actions"><button class="secondary" onclick="closeModal();renderFinanceiro()">Cancelar</button><button onclick="confirmarPagamento('${id}')">Salvar pagamento</button></div>`)}
async function confirmarPagamento(id){const p=pagamentos.find(x=>x.id===id);if(!p)return;const data=document.getElementById('dataPagamento')?.value||p.data_vencimento||hojeISO();const r=await sb.from('pagamentos').update({status:'recebido',data_recebimento:data}).eq('id',id);if(r.error){alert('Erro ao atualizar pagamento.');return}await atualizarUltimoPagamentoAluno(p.aluno_id);closeModal();await carregarDados()}
async function desfazerPagamento(id){const p=pagamentos.find(x=>x.id===id);if(!p)return;const r=await sb.from('pagamentos').update({status:'pendente',data_recebimento:null}).eq('id',id);if(r.error){alert('Erro ao desfazer pagamento.');return}await atualizarUltimoPagamentoAluno(p.aluno_id,id);closeModal();await carregarDados()}
async function atualizarUltimoPagamentoAluno(alunoId,ignorarId=''){const {data}=await sb.from('pagamentos').select('id,data_recebimento,data_vencimento,status').eq('aluno_id',alunoId).eq('status','recebido');const ultimo=(data||[]).filter(p=>p.id!==ignorarId).sort((a,b)=>String(b.data_recebimento||b.data_vencimento).localeCompare(String(a.data_recebimento||a.data_vencimento)))[0];await sb.from('alunos').update({ultimo_pagamento:ultimo?(ultimo.data_recebimento||ultimo.data_vencimento):null}).eq('id',alunoId)}
function renderCadastro(){const el=document.getElementById('cadastro');el.innerHTML=`<div class="sectionTitle">Cadastrar aluno</div><div class="card"><div class="formGrid"><div class="field"><label>Aluno</label><input id="cadNome" placeholder="Nome do aluno" oninput="updateCadastroPreview()"></div><div class="field"><label>Quantos dias na semana</label><select id="cadFreq" onchange="updateCadastroPreview()"><option value="1">1x semana</option><option value="2">2x semana</option><option value="3" selected>3x semana</option><option value="4">4x semana</option><option value="5">5x semana</option></select></div><div class="field"><label>Primeiro dia do pacote</label><input id="cadPrimeiro" type="date" value="${hojeISO()}" onchange="cadastroAjustes={};mesCadastro=this.value.slice(0,7);if(document.getElementById('cadPagamento'))document.getElementById('cadPagamento').value=this.value;updateCadastroPreview()"></div><div class="field"><label>Data do pagamento</label><input id="cadPagamento" type="date" value="${hojeISO()}"></div><div class="field"><label>Cobrança</label><select id="tipoCobranca" onchange="toggleCobranca();updateCadastroPreview()"><option value="aula">Pacote avulso</option><option value="pacote" selected>Pacote fechado</option></select></div><div class="field"><label>Horário inicial</label><input id="cadHoraInicio" type="time" value="07:00" onchange="updateCadastroPreview()"></div><div class="field"><label>Horário final</label><input id="cadHoraFim" type="time" value="08:00" onchange="updateCadastroPreview()"></div><div class="field cobrancaAula hidden"><label>Valor por aula</label><input id="cadValorAula" type="number" value="85" oninput="updateCadastroPreview()"></div><div class="field cobrancaAula hidden"><label>Quantidade de aulas avulsas</label><input id="cadQtdAvulso" type="number" value="1" oninput="cadastroAjustes={};updateCadastroPreview()"></div><div class="field cobrancaPacote"><label>Quantidade de aulas no pacote</label><select id="cadQtdPacote" onchange="setValorPacote();cadastroAjustes={};updateCadastroPreview()"><option value="8">8 aulas</option><option value="12" selected>12 aulas</option><option value="16">16 aulas</option></select></div><div class="field cobrancaPacote"><label>Valor do pacote</label><input id="cadValorPacote" type="number" value="960" oninput="updateCadastroPreview()"></div><div class="field"><label>Local</label><input id="cadLocal" value="A definir"></div></div><label>Quais dias na semana</label><div class="weekBtns" id="cadWeekBtns">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>`<button type="button" class="${[1,4].includes(i)?'on':''}" data-dia="${i}" onclick="this.classList.toggle('on');cadastroAjustes={};updateCadastroPreview()">${d}</button>`).join('')}</div><br><button onclick="salvarAluno()">Cadastrar aluno e aulas</button></div><div id="cadPreview"></div>`;toggleCobranca();updateCadastroPreview()}
function setValorPacote(){const q=Number(document.getElementById('cadQtdPacote')?.value||12);const vals={8:640,12:960,16:1200};const el=document.getElementById('cadValorPacote');if(el)el.value=vals[q]||0}
function cadastroDias(){return [...document.querySelectorAll('#cadWeekBtns button.on')].map(b=>Number(b.dataset.dia))}
function gerarCadastroAulas(){const first=document.getElementById('cadPrimeiro')?.value||hojeISO();const tipo=document.getElementById('tipoCobranca')?.value||'pacote';const qtd=Number(tipo==='pacote'?document.getElementById('cadQtdPacote')?.value:document.getElementById('cadQtdAvulso')?.value)||1;let dias=cadastroDias();if(!dias.length){const [y,m,d]=first.split('-').map(Number);dias=[new Date(Date.UTC(y,m-1,d,12)).getUTCDay()]}const hi=document.getElementById('cadHoraInicio')?.value||'07:00';const hf=document.getElementById('cadHoraFim')?.value||'08:00';let out=[],dt=new Date(first+'T12:00:00'),guard=0;while(out.length<qtd&&guard<370){const iso=dt.toISOString().slice(0,10);if(dias.includes(dt.getDay())){const idx=out.length;const aj=cadastroAjustes[idx]||{};out.push({idx,original:iso,data:aj.data||iso,hora_inicio:aj.hora_inicio||hi,hora_fim:aj.hora_fim||hf,motivo:aj.motivo||''})}dt.setDate(dt.getDate()+1);guard++}return out.sort((a,b)=>a.data.localeCompare(b.data)||a.hora_inicio.localeCompare(b.hora_inicio))}
function updateCadastroPreview(){const el=document.getElementById('cadPreview');if(!el)return;const lista=gerarCadastroAulas();const tipo=document.getElementById('tipoCobranca')?.value||'pacote';const valor=tipo==='pacote'?Number(document.getElementById('cadValorPacote')?.value||0):lista.length*Number(document.getElementById('cadValorAula')?.value||85);el.innerHTML=`<div class="card"><div class="calendarHead"><div><div class="sectionTitle">Prévia das aulas</div><div class="mut">${lista.length} aulas · Total previsto: R$ ${valor.toLocaleString('pt-BR')}</div></div></div><div class="swipeHint">Arraste o calendário para os lados. Clique numa aula para remarcar antes de salvar.</div>${cadastroCalendarHtml(lista)}</div>`}
function cadastroCalendarHtml(lista){const [yy,mm]=mesCadastro.split('-').map(Number);const days=new Date(yy,mm,0).getDate();const first=new Date(`${mesCadastro}-01T12:00:00`).getDay();const names=['D','S','T','Q','Q','S','S'];let html=`<div class="swipeArea" onpointerdown="swipeCadastroStart(event)" onpointerup="swipeCadastroEnd(event)" onpointercancel="swipeCadastroCancel()" ontouchstart="swipeCadastroStart(event)" ontouchend="swipeCadastroEnd(event)"><div class="calendarHead"><div class="title">${nomesMes[mm-1].toUpperCase()} ${yy}</div><div><span class="pill"><i class="dot blue"></i>Aula prevista</span></div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${mesCadastro}-${String(d).padStart(2,'0')}`;const aulasDia=lista.filter(a=>a.data===date);html+=`<div class="day" onclick="clickCadastroDia('${date}')"><div class="dayNum">${d}</div><div class="dots">${aulasDia.map(()=>`<span class="dot blue"></span>`).join('')}</div>${aulasDia.map(a=>`<div class="mut">${a.hora_inicio}</div>`).join('')}</div>`}return html+'</div></div>'}
function swipeCadastroStart(ev){swipeCadastroStartX=swipeX(ev);swipeMoved=false}
function swipeCadastroCancel(){swipeCadastroStartX=0}
function swipeCadastroEnd(ev){const dx=swipeX(ev)-swipeCadastroStartX;if(Math.abs(dx)>65){swipeMoved=true;mesCadastro=monthAdd(mesCadastro,dx>0?-1:1);updateCadastroPreview();setTimeout(()=>swipeMoved=false,250)}swipeCadastroStartX=0}

function clickCadastroDia(date){if(swipeMoved)return;const lista=gerarCadastroAulas().filter(a=>a.data===date);if(!lista.length)return;const a=lista[0];modalHtml(`<div class="sectionTitle">Remarcar aula prevista</div><div class="field"><label>Novo dia</label><input id="prevData" type="date" value="${a.data}"></div><div class="grid"><div class="field"><label>Início</label><input id="prevHoraInicio" type="time" value="${a.hora_inicio}"></div><div class="field"><label>Fim</label><input id="prevHoraFim" type="time" value="${a.hora_fim}"></div></div><div class="field"><label>Motivo</label><textarea id="prevMotivo" placeholder="Ex: cliente não poderá nesse dia">${a.motivo||''}</textarea></div><div class="actions"><button onclick="salvarRemarcacaoPreview(${a.idx})">Salvar remarcação</button><button class="secondary" onclick="closeModal()">Cancelar</button></div>`)}
function salvarRemarcacaoPreview(idx){cadastroAjustes[idx]={data:document.getElementById('prevData').value,hora_inicio:document.getElementById('prevHoraInicio').value,hora_fim:document.getElementById('prevHoraFim').value,motivo:document.getElementById('prevMotivo').value};mesCadastro=cadastroAjustes[idx].data.slice(0,7);closeModal();updateCadastroPreview()}
function renderAjustes(){const el=document.getElementById('ajustes');const tinhaPreview=!!document.getElementById('editPreview');const atual=document.getElementById('editAluno')?.value||alunos[0]?.id||'';const a=alunos.find(x=>x.id===atual)||{};const prox=monthAdd(hojeISO().slice(0,7),1)+'-01';if(!tinhaPreview||!mesAjuste)mesAjuste=prox.slice(0,7);el.innerHTML=`<div class="sectionTitle">Cadastrar novo plano</div><div class="card"><label>Selecionar aluno</label><select id="editAluno" onchange="ajusteAjustes={};mesAjuste='';renderAjustes()">${alunos.map(x=>`<option value="${x.id}" ${x.id===atual?'selected':''}>${x.nome}</option>`).join('')}</select></div>${a.id?`<div class="card"><div class="formGrid"><div class="field"><label>Frequência semanal</label><select id="editFreq" onchange="updateAjustePreview()">${[1,2,3,4,5].map(n=>`<option value="${n}" ${Number(a.frequencia_semanal)===n?'selected':''}>${n}x semana</option>`).join('')}</select></div><div class="field"><label>Primeiro dia do novo plano</label><input id="editPrimeiro" type="date" value="${prox}" onchange="ajusteAjustes={};mesAjuste=this.value.slice(0,7);if(document.getElementById('editPagamento'))document.getElementById('editPagamento').value=this.value;updateAjustePreview()"></div><div class="field"><label>Data do pagamento</label><input id="editPagamento" type="date" value="${prox}"></div><div class="field"><label>Horário inicial</label><input id="editHoraInicio" type="time" value="07:00" onchange="updateAjustePreview()"></div><div class="field"><label>Horário final</label><input id="editHoraFim" type="time" value="08:00" onchange="updateAjustePreview()"></div><div class="field"><label>Cobrança</label><select id="editTipo" onchange="toggleEditCobranca();updateAjustePreview()"><option value="aula" ${a.tipo_cobranca==='aula'?'selected':''}>Pacote avulso</option><option value="pacote" ${a.tipo_cobranca!=='aula'?'selected':''}>Pacote fechado</option></select></div><div class="field editCobrancaAula"><label>Valor por aula</label><input id="editValorAula" type="number" value="${Number(a.valor_por_aula||85)}" oninput="updateAjustePreview()"></div><div class="field editCobrancaAula"><label>Quantidade de aulas avulsas</label><input id="editQtdAvulso" type="number" value="${Number(a.quantidade_aulas_plano||1)}" oninput="ajusteAjustes={};updateAjustePreview()"></div><div class="field editCobrancaPacote"><label>Quantidade de aulas do pacote</label><select id="editQtd" onchange="setValorEditPacote();ajusteAjustes={};updateAjustePreview()">${[8,12,16].map(n=>`<option value="${n}" ${Number(a.quantidade_aulas_plano||12)===n?'selected':''}>${n} aulas</option>`).join('')}</select></div><div class="field editCobrancaPacote"><label>Valor do pacote</label><input id="editValorPacote" type="number" value="${Number(a.valor_pacote||960)}" oninput="updateAjustePreview()"></div></div><label>Dias da semana</label><div class="weekBtns" id="editWeekBtns">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>`<button type="button" class="${(a.dias_semana||[]).map(Number).includes(i)?'on':''}" data-dia="${i}" onclick="this.classList.toggle('on');ajusteAjustes={};updateAjustePreview()">${d}</button>`).join('')}</div><br><button onclick="cadastrarNovoPlano('${a.id}')">Cadastrar novo plano</button></div><div id="editPreview"></div>`:'<div class="card mut">Nenhum aluno cadastrado.</div>'}`;toggleEditCobranca();updateAjustePreview()}
function toggleCobranca(){const tipo=document.getElementById('tipoCobranca')?.value||'pacote';document.querySelectorAll('.cobrancaAula').forEach(e=>e.classList.toggle('hidden',tipo!=='aula'));document.querySelectorAll('.cobrancaPacote').forEach(e=>e.classList.toggle('hidden',tipo!=='pacote'))}
function toggleEditCobranca(){const tipo=document.getElementById('editTipo')?.value||'pacote';document.querySelectorAll('.editCobrancaAula').forEach(e=>e.classList.toggle('hidden',tipo!=='aula'));document.querySelectorAll('.editCobrancaPacote').forEach(e=>e.classList.toggle('hidden',tipo!=='pacote'))}
function setValorEditPacote(){const q=Number(document.getElementById('editQtd')?.value||12);const vals={8:640,12:960,16:1200};const el=document.getElementById('editValorPacote');if(el)el.value=vals[q]||0}
function editDias(){return [...document.querySelectorAll('#editWeekBtns button.on')].map(b=>Number(b.dataset.dia))}
function gerarAjusteAulas(){const first=document.getElementById('editPrimeiro')?.value||hojeISO();const tipo=document.getElementById('editTipo')?.value||'pacote';const qtd=Number(tipo==='pacote'?document.getElementById('editQtd')?.value:document.getElementById('editQtdAvulso')?.value)||1;let dias=editDias();if(!dias.length){const [y,m,d]=first.split('-').map(Number);dias=[new Date(Date.UTC(y,m-1,d,12)).getUTCDay()]}const hi=document.getElementById('editHoraInicio')?.value||'07:00';const hf=document.getElementById('editHoraFim')?.value||'08:00';let out=[],dt=new Date(first+'T12:00:00'),guard=0;while(out.length<qtd&&guard<370){const iso=dt.toISOString().slice(0,10);if(dias.includes(dt.getDay())){const idx=out.length;const aj=ajusteAjustes[idx]||{};out.push({idx,original:iso,data:aj.data||iso,hora_inicio:aj.hora_inicio||hi,hora_fim:aj.hora_fim||hf,motivo:aj.motivo||''})}dt.setDate(dt.getDate()+1);guard++}return out.sort((a,b)=>a.data.localeCompare(b.data)||a.hora_inicio.localeCompare(b.hora_inicio))}
function updateAjustePreview(){const el=document.getElementById('editPreview');if(!el)return;const lista=gerarAjusteAulas();const tipo=document.getElementById('editTipo')?.value||'pacote';const valor=tipo==='pacote'?Number(document.getElementById('editValorPacote')?.value||0):lista.length*Number(document.getElementById('editValorAula')?.value||85);el.innerHTML=`<div class="card"><div class="calendarHead"><div><div class="sectionTitle">Prévia do novo plano</div><div class="mut">${lista.length} aulas · Total previsto: ${dinheiro(valor)}</div></div></div><div class="swipeHint">Arraste o calendário para os lados. Clique numa aula para ajustar antes de cadastrar.</div>${ajusteCalendarHtml(lista)}</div>`}
function ajusteCalendarHtml(lista){const [yy,mm]=mesAjuste.split('-').map(Number);const days=new Date(yy,mm,0).getDate();const first=new Date(`${mesAjuste}-01T12:00:00`).getDay();const names=['D','S','T','Q','Q','S','S'];let html=`<div class="swipeArea" onpointerdown="swipeAjusteStart(event)" onpointerup="swipeAjusteEnd(event)" onpointercancel="swipeAjusteCancel()" ontouchstart="swipeAjusteStart(event)" ontouchend="swipeAjusteEnd(event)"><div class="calendarHead"><div class="title">${nomesMes[mm-1].toUpperCase()} ${yy}</div><div><span class="pill"><i class="dot blue"></i>Aula prevista</span></div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${mesAjuste}-${String(d).padStart(2,'0')}`;const aulasDia=lista.filter(a=>a.data===date);html+=`<div class="day" onclick="clickAjusteDia('${date}')"><div class="dayNum">${d}</div><div class="dots">${aulasDia.map(()=>`<span class="dot blue"></span>`).join('')}</div>${aulasDia.map(a=>`<div class="mut">${a.hora_inicio}</div>`).join('')}</div>`}return html+'</div></div>'}
function clickAjusteDia(date){if(swipeMoved)return;const lista=gerarAjusteAulas().filter(a=>a.data===date);if(!lista.length)return;const a=lista[0];modalHtml(`<div class="sectionTitle">Ajustar aula prevista</div><div class="field"><label>Novo dia</label><input id="ajData" type="date" value="${a.data}"></div><div class="grid"><div class="field"><label>Início</label><input id="ajHoraInicio" type="time" value="${a.hora_inicio}"></div><div class="field"><label>Fim</label><input id="ajHoraFim" type="time" value="${a.hora_fim}"></div></div><div class="field"><label>Motivo</label><textarea id="ajMotivo" placeholder="Ex: cliente não poderá nesse dia">${a.motivo||''}</textarea></div><div class="actions"><button onclick="salvarAjustePreview(${a.idx})">Salvar ajuste</button><button class="secondary" onclick="closeModal()">Cancelar</button></div>`)}
function salvarAjustePreview(idx){ajusteAjustes[idx]={data:document.getElementById('ajData').value,hora_inicio:document.getElementById('ajHoraInicio').value,hora_fim:document.getElementById('ajHoraFim').value,motivo:document.getElementById('ajMotivo').value};mesAjuste=ajusteAjustes[idx].data.slice(0,7);closeModal();updateAjustePreview()}
async function salvarAluno(){const nome=document.getElementById('cadNome').value.trim();if(!nome)return alert('Digite o nome do aluno.');const lista=gerarCadastroAulas();if(!lista.length)return alert('Monte pelo menos uma aula.');const localNome=document.getElementById('cadLocal').value.trim()||'A definir';let {data:loc}=await sb.from('locais').select('id').eq('nome',localNome).maybeSingle();if(!loc){const r=await sb.from('locais').insert({nome:localNome}).select('id').single();loc=r.data}const dias=cadastroDias();const tipo=document.getElementById('tipoCobranca').value;const qtd=tipo==='pacote'?Number(document.getElementById('cadQtdPacote').value):lista.length;const valor=tipo==='pacote'?Number(document.getElementById('cadValorPacote').value):lista.length*Number(document.getElementById('cadValorAula').value||85);const inicio=lista[0].data;const dataPagamento=document.getElementById('cadPagamento')?.value||inicio;const status=inicio>='2026-05-01'?'pendente':'recebido';const ins=await sb.from('alunos').insert({nome,local_id:loc.id,frequencia_semanal:Number(document.getElementById('cadFreq').value),dias_semana:dias,primeiro_dia:inicio,tipo_cobranca:tipo,valor_por_aula:Number(document.getElementById('cadValorAula')?.value||85),quantidade_aulas_plano:qtd,valor_pacote:tipo==='pacote'?valor:null,data_primeiro_pagamento:dataPagamento,ultimo_pagamento:status==='recebido'?dataPagamento:null,ativo:true}).select('id').single();if(ins.error)return alert('Erro ao cadastrar aluno.');const alunoId=ins.data.id;await sb.from('pagamentos').insert({aluno_id:alunoId,data_vencimento:dataPagamento,data_recebimento:status==='recebido'?dataPagamento:null,valor,status,tipo_cobranca:tipo,quantidade_aulas:qtd,data_inicio_plano:inicio,data_fim_prevista:lista[lista.length-1].data,observacao:'Cadastrado pelo painel'});await sb.from('aulas').insert(lista.map(a=>({aluno_id:alunoId,data_aula:a.data,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:'pendente',motivo:a.motivo||null})));cadastroAjustes={};await carregarDados();showTab('calendario');alert('Aluno, pagamento e aulas cadastrados.')}
async function cadastrarNovoPlano(id){const aluno=alunos.find(a=>a.id===id);if(!aluno)return;const lista=gerarAjusteAulas();if(!lista.length)return alert('Monte pelo menos uma aula.');const tipo=document.getElementById('editTipo').value;const qtd=tipo==='pacote'?Number(document.getElementById('editQtd').value):lista.length;const valor=tipo==='pacote'?Number(document.getElementById('editValorPacote').value):lista.length*Number(document.getElementById('editValorAula').value||85);const dias=editDias();const inicio=lista[0].data;const dataPagamento=document.getElementById('editPagamento')?.value||inicio;const status=inicio>='2026-05-01'?'pendente':'recebido';await sb.from('alunos').update({frequencia_semanal:Number(document.getElementById('editFreq').value),dias_semana:dias,tipo_cobranca:tipo,valor_por_aula:Number(document.getElementById('editValorAula')?.value||85),quantidade_aulas_plano:qtd,valor_pacote:tipo==='pacote'?valor:null,data_primeiro_pagamento:dataPagamento,ultimo_pagamento:status==='recebido'?dataPagamento:aluno.ultimo_pagamento}).eq('id',id);await sb.from('pagamentos').insert({aluno_id:id,data_vencimento:dataPagamento,data_recebimento:status==='recebido'?dataPagamento:null,valor,status,tipo_cobranca:tipo,quantidade_aulas:qtd,data_inicio_plano:inicio,data_fim_prevista:lista[lista.length-1].data,observacao:'Novo plano cadastrado pelo painel'});await sb.from('aulas').insert(lista.map(a=>({aluno_id:id,data_aula:a.data,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:'pendente',motivo:a.motivo||null,local_id:aluno.local_id||null})));ajusteAjustes={};await carregarDados();showTab('calendario');alert('Novo plano cadastrado.')}
checarSenha();carregarDados();
