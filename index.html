<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thayara Alencar - Personal Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d0f14;--card:#171b24;--card2:#202637;--txt:#f6f3ef;--mut:#aab0bf;--line:#30384c;--acc:#f2b84b;--green:#48d17d;--green2:#1d8f50;--greenLight:#b9f6cf;--red:#ff6464;--blue:#4aa3ff}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0d0f14,#121722);color:var(--txt);font-family:Arial,Helvetica,sans-serif}.hidden{display:none!important}
header{position:sticky;top:0;z-index:5;background:rgba(13,15,20,.97);border-bottom:1px solid var(--line);padding:12px 14px;text-align:center}.logo{width:96px;height:96px;object-fit:contain;border-radius:22px;background:#f7f5f0;margin:0 auto 8px;display:block;border:1px solid rgba(242,184,75,.25)}h1{margin:0;font-size:21px;color:var(--acc);letter-spacing:.8px}.sub{margin-top:4px;color:var(--mut);font-size:13px;text-transform:uppercase;letter-spacing:4px}
main{max-width:980px;margin:0 auto;padding:14px}.tabs{position:sticky;top:160px;z-index:4;background:rgba(13,15,20,.96);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 0;margin-bottom:12px}.tab{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:14px;padding:12px 8px;font-weight:800;font-size:12px;cursor:pointer}.tab.active{background:var(--acc);color:#16110a;border-color:var(--acc)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title{font-weight:900;font-size:17px}.mut{color:var(--mut);font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:7px 10px;font-size:12px;color:var(--mut)}
button,input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:var(--card2);color:var(--txt);padding:11px;font-size:15px}button{background:var(--acc);color:#16110a;border:none;font-weight:900;cursor:pointer}.secondary{background:var(--card2);color:var(--txt);border:1px solid var(--line)}.doneBtn{background:var(--greenLight);color:#093d20}.doneBtn.checked{background:var(--green2);color:white}.danger{background:var(--red);color:white}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.done{opacity:.72}.done .title{text-decoration:line-through}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:10px}label{display:block;color:var(--mut);font-size:12px;margin:0 0 5px 2px}.sectionTitle{font-size:18px;font-weight:900;margin:4px 0 12px;color:var(--acc)}
.topLine,.calendarHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.dayNav,.monthNav{display:flex;gap:7px}.dayNav button,.monthNav button{padding:8px 10px;font-size:12px;white-space:nowrap}.studentGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stat{background:#11151f;border:1px solid var(--line);border-radius:14px;padding:10px}.stat b{display:block;font-size:16px}.bar{height:8px;background:#10141d;border-radius:99px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--green))}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.dow,.day{min-height:48px;border-radius:13px;border:1px solid var(--line);background:#11151f;padding:7px;font-size:12px}.dow{min-height:auto;text-align:center;color:var(--mut);background:transparent;border:none;font-weight:900}.day{cursor:pointer}.day:hover{border-color:var(--acc)}.dayNum{font-weight:900}.dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.dot{width:9px;height:9px;border-radius:50%;display:inline-block}.green{background:var(--green)}.red{background:var(--red)}.blue{background:var(--blue)}.money{font-size:24px;font-weight:900}.money.good{color:var(--green)}.money.warn{color:var(--acc)}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.weekBtns{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.weekBtns button{font-size:12px;padding:9px 4px;background:var(--card2);color:var(--mut);border:1px solid var(--line)}.weekBtns button.on{background:var(--acc);color:#16110a}.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:flex;align-items:flex-end;justify-content:center;z-index:20;padding:14px}.modalBox{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px}.infoList{line-height:1.55;white-space:pre-wrap}.lockScreen{position:fixed;inset:0;background:linear-gradient(180deg,#0d0f14,#121722);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px}.lockBox{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,.35)}.lockBox img{width:120px;height:120px;object-fit:contain;border-radius:24px;background:#f7f5f0;margin:0 auto 10px;display:block}.lockBox h2{margin:6px 0 4px;color:var(--acc)}.lockError{min-height:18px;color:var(--red);font-size:13px;margin-top:8px}.loading{padding:18px;color:var(--mut);text-align:center}
@media(max-width:760px){.logo{width:82px;height:82px}.tabs{grid-template-columns:1fr 1fr;top:142px}.studentGrid,.formGrid{grid-template-columns:1fr}.statGrid{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.cal{gap:5px}.day{min-height:44px;padding:6px}.weekBtns{grid-template-columns:repeat(4,1fr)}.topLine,.calendarHead{align-items:flex-start;flex-direction:column}.dayNav,.monthNav{width:100%}}
</style>
</head>
<body>
<div id="lockScreen" class="lockScreen"><div class="lockBox"><img src="assets/logo-thayara.jpg" alt="Thayara"><h2>THAYARA ALENCAR</h2><div class="mut">Personal Trainer</div><br><label>Senha</label><input id="senhaEntrada" type="password" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') entrarPainel()"><br><br><button onclick="entrarPainel()">Entrar</button><div id="lockError" class="lockError"></div></div></div>
<header><img class="logo" src="assets/logo-thayara.jpg" alt="Thayara Alencar"><h1>THAYARA ALENCAR</h1><div class="sub">Personal Trainer</div></header>
<main>
<nav class="tabs"><button class="tab active" data-tab="aulas" onclick="showTab('aulas')">AULAS DO DIA</button><button class="tab" data-tab="alunos" onclick="showTab('alunos')">RESUMO DOS ALUNOS</button><button class="tab" data-tab="calendario" onclick="showTab('calendario')">CALENDÁRIO</button><button class="tab" data-tab="financeiro" onclick="showTab('financeiro')">FINANCEIRO</button><button class="tab" data-tab="ajustes" onclick="showTab('ajustes')">AJUSTE DE HORÁRIOS</button></nav>
<div id="globalStatus" class="loading">Carregando dados...</div>
<section id="aulas"></section><section id="alunos" class="hidden"></section><section id="calendario" class="hidden"></section><section id="financeiro" class="hidden"></section><section id="ajustes" class="hidden"></section>
</main>
<div id="modal" class="modal hidden"><div class="modalBox" id="modalBox"></div></div>
<script>
const SENHA_PAINEL='THAY123';
const SUPABASE_URL='https://eioishjujhvhawisdkrt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpb2lzaGp1amh2aGF3aXNka3J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDIyNTksImV4cCI6MjA5NDM3ODI1OX0.-zIiisfj68EOx5_1EIT2OF6CsPxWJ-H64czv4aQXJdo';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let alunos=[],aulas=[],pagamentos=[],abaAtual='aulas',dataAulas=hojeISO(),mesCalendario=hojeISO().slice(0,7),mesFinanceiro=hojeISO().slice(0,7),remarcando=null;
const nomesMes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function entrarPainel(){const v=(senhaEntrada?.value||'').trim();if(v===SENHA_PAINEL){sessionStorage.setItem('thayara_auth','1');lockScreen.classList.add('hidden');return}lockError.textContent='Senha incorreta.'}
function checarSenha(){if(sessionStorage.getItem('thayara_auth')==='1')lockScreen.classList.add('hidden')}
function hojeISO(){const d=new Date();return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Fortaleza',year:'numeric',month:'2-digit',day:'2-digit'}).format(d)}
function fmtData(iso){if(!iso)return'';const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`}
function tituloDia(iso){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d,12));const semana=new Intl.DateTimeFormat('pt-BR',{weekday:'long',timeZone:'UTC'}).format(dt);return `${String(d).padStart(2,'0')}/${nomesMes[m-1]} ${semana.charAt(0).toUpperCase()+semana.slice(1)}`}
function addDays(iso,n){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d+n,12));return dt.toISOString().slice(0,10)}
function addHour(h){let [hh,mm]=String(h||'07:00').slice(0,5).split(':').map(Number);hh=(hh+1)%24;return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}
function monthAdd(mes,n){const [y,m]=mes.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1+n,1,12));return dt.toISOString().slice(0,7)}
function statusCor(s){return s==='dada'?'green':(s==='remarcada'||s==='perdida'||s==='cancelada')?'red':'blue'}
function alunoNome(id){return alunos.find(a=>a.id===id)?.nome||''}
function closeModal(){modal.classList.add('hidden');modalBox.innerHTML=''}
function modalHtml(html){modalBox.innerHTML=html;modal.classList.remove('hidden')}
function showTab(id){abaAtual=id;document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));renderAll()}
async function carregarDados(){globalStatus.textContent='Carregando dados...';const [ra,ru,rp]=await Promise.all([sb.from('alunos').select('*,locais(nome)').order('nome'),sb.from('aulas').select('*').order('data_aula'),sb.from('pagamentos').select('*').order('data_vencimento')]);if(ra.error||ru.error||rp.error){globalStatus.textContent='Erro ao carregar dados do Supabase.';console.error(ra.error||ru.error||rp.error);return}alunos=ra.data||[];aulas=ru.data||[];pagamentos=rp.data||[];globalStatus.classList.add('hidden');renderAll()}
function renderAll(){renderAulas();renderAlunos();renderCalendario();renderFinanceiro();renderAjustes()}
function renderAulas(){const lista=aulas.filter(a=>a.data_aula===dataAulas).sort((a,b)=>String(a.hora_inicio).localeCompare(String(b.hora_inicio)));aulasEl=document.getElementById('aulas');aulasEl.innerHTML=`<div class="topLine"><div class="sectionTitle">Aulas do dia — ${tituloDia(dataAulas)}</div><div class="dayNav"><button class="secondary" onclick="dataAulas=addDays(dataAulas,-1);renderAulas()">← Dia anterior</button><button class="secondary" onclick="dataAulas=addDays(dataAulas,1);renderAulas()">Próximo dia →</button></div></div>`+(lista.length?lista.map(a=>`<div class="card ${a.status==='dada'?'done':''}"><div class="row"><div><div class="title">${alunoNome(a.aluno_id)}</div><div class="mut">de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)}</div>${a.status==='remarcada'?`<div class="pill">Remarcada: ${a.motivo||''}</div>`:''}</div><span class="pill">${String(a.status).toUpperCase()}</span></div><div class="actions"><button class="doneBtn ${a.status==='dada'?'checked':''}" onclick="aulaDada('${a.id}')">✓ Aula dada</button><button class="secondary" onclick="openRemarcar('${a.id}')">Remarcar</button></div></div>`).join(''):`<div class="card mut">Nenhuma aula cadastrada para este dia.</div>`)}
async function aulaDada(id){await sb.from('aulas').update({status:'dada',motivo:null}).eq('id',id);await carregarDados()}
function openRemarcar(id){remarcando=aulas.find(a=>a.id===id);if(!remarcando)return;modalHtml(`<div class="sectionTitle">Remarcar aula</div><div class="mut">${alunoNome(remarcando.aluno_id)} — ${fmtData(remarcando.data_aula)} de ${String(remarcando.hora_inicio).slice(0,5)} às ${String(remarcando.hora_fim).slice(0,5)}</div><br><div class="grid"><div class="field"><label>Novo dia</label><input type="date" id="novaData" value="${remarcando.data_aula}"></div><div class="field"><label>Novo horário</label><input type="time" id="novaHora" value="${String(remarcando.hora_inicio).slice(0,5)}"></div></div><div class="field"><label>Motivo</label><textarea id="motivo" rows="3"></textarea></div><div class="actions"><button class="secondary" onclick="closeModal()">Cancelar</button><button onclick="confirmarRemarcacao()">Salvar remarcação</button></div>`)}
async function confirmarRemarcacao(){if(!remarcando)return;const motivo=document.getElementById('motivo').value.trim()||'Sem motivo informado';const nd=novaData.value,nh=novaHora.value;await sb.from('aulas').update({status:'remarcada',motivo,remarcada_para_data:nd,remarcada_para_hora:nh}).eq('id',remarcando.id);await sb.from('aulas').insert({aluno_id:remarcando.aluno_id,data_aula:nd,hora_inicio:nh,hora_fim:addHour(nh),status:'pendente',local_id:remarcando.local_id});await sb.from('remarcacoes').insert({aula_id:remarcando.id,aluno_id:remarcando.aluno_id,data_original:remarcando.data_aula,hora_original:remarcando.hora_inicio,nova_data:nd,nova_hora:nh,motivo});closeModal();await carregarDados()}
function renderAlunos(){alunosEl.innerHTML=`<div class="sectionTitle">Resumo dos alunos</div><div class="studentGrid">`+alunos.map(a=>{const au=aulas.filter(x=>x.aluno_id===a.id);const feitas=au.filter(x=>x.status==='dada').length;const faltam=Math.max(0,(a.quantidade_aulas_plano||0)-feitas);return `<div class="card"><div class="title">${a.nome}</div><div class="mut">${a.locais?.nome||'A definir'}</div><div class="statGrid"><div class="stat"><span class="mut">Último pagamento</span><b>${fmtData(a.ultimo_pagamento)}</b></div><div class="stat"><span class="mut">Plano</span><b>${a.quantidade_aulas_plano||0} aulas</b></div><div class="stat"><span class="mut">Frequência</span><b>${a.frequencia_semanal||0}x semana</b></div><div class="stat"><span class="mut">Já foram</span><b>${feitas}</b></div><div class="stat"><span class="mut">Faltam</span><b>${faltam}</b></div><div class="stat"><span class="mut">Próx. pagamento</span><b>${fmtData(a.proximo_pagamento)||'-'}</b></div></div><div class="bar"><span style="width:${a.quantidade_aulas_plano?Math.min(100,Math.round((feitas/a.quantidade_aulas_plano)*100)):0}%"></span></div></div>`}).join('')+`</div>`}
function renderCalendario(){const atual=document.getElementById('selAluno')?.value||alunos[0]?.id||'';calendario.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Calendário do aluno</div><div class="monthNav"><button class="secondary" onclick="mesCalendario=monthAdd(mesCalendario,-1);renderCalendario()">← Mês anterior</button><button class="secondary" onclick="mesCalendario=monthAdd(mesCalendario,1);renderCalendario()">Próximo mês →</button></div></div><div class="card"><label>Selecionar aluno</label><select id="selAluno" onchange="renderCalendario()">${alunos.map(a=>`<option value="${a.id}" ${atual===a.id?'selected':''}>${a.nome}</option>`).join('')}</select></div>${calendarHtml({alunoId:atual,tipo:'student',mes:mesCalendario})}`}
function calendarHtml({alunoId='',tipo='student',mes=mesCalendario}={}){const [yy,mm]=mes.split('-').map(Number);const days=new Date(yy,mm,0).getDate();const first=new Date(`${mes}-01T12:00:00`).getDay();const names=['D','S','T','Q','Q','S','S'];const legenda=tipo==='finance'?'<span class="pill"><i class="dot green"></i>Recebido</span> <span class="pill"><i class="dot red"></i>A receber</span>':'<span class="pill"><i class="dot green"></i>Dada</span> <span class="pill"><i class="dot red"></i>Remarcada/perdida</span> <span class="pill"><i class="dot blue"></i>Pendente</span>';let html=`<div class="card"><div class="calendarHead"><div class="title">${nomesMes[mm-1].toUpperCase()} ${yy}</div><div>${legenda}</div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${mes}-${String(d).padStart(2,'0')}`;let dots=[];if(tipo==='student'){dots=aulas.filter(a=>a.aluno_id===alunoId&&a.data_aula===date).map(a=>statusCor(a.status))}else{dots=pagamentos.filter(p=>(p.data_recebimento||p.data_vencimento)===date || p.data_vencimento===date).map(p=>p.status==='recebido'?'green':'red')}html+=`<div class="day" onclick="${tipo==='student'?`clickDiaAluno('${date}','${alunoId}')`:`clickDiaFinanceiro('${date}')`}"><div class="dayNum">${d}</div><div class="dots">${dots.map(c=>`<span class="dot ${c}"></span>`).join('')}</div></div>`}return html+'</div></div>'}
function clickDiaAluno(date,alunoId){const lista=aulas.filter(a=>a.aluno_id===alunoId&&a.data_aula===date);if(!lista.length)return;const pend=lista.find(a=>a.status==='pendente');if(pend){modalHtml(`<div class="sectionTitle">Aula pendente</div><div class="infoList">${alunoNome(pend.aluno_id)}\n${fmtData(pend.data_aula)} de ${String(pend.hora_inicio).slice(0,5)} às ${String(pend.hora_fim).slice(0,5)}</div><br><button onclick="closeModal();openRemarcar('${pend.id}')">Deseja remarcar?</button><br><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}const red=lista.find(a=>a.status==='remarcada'||a.status==='perdida');if(red){modalHtml(`<div class="sectionTitle">Aula remarcada / falta</div><div class="infoList">Aluno: ${alunoNome(red.aluno_id)}\nData original: ${fmtData(red.data_aula)}\nMotivo: ${red.motivo||'Não informado'}\nRemarcada para: ${red.remarcada_para_data?fmtData(red.remarcada_para_data)+' '+String(red.remarcada_para_hora||'').slice(0,5):'Ainda não definida'}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}modalHtml(`<div class="sectionTitle">Aula dada</div><div class="infoList">${lista.map(a=>`${alunoNome(a.aluno_id)} — ${fmtData(a.data_aula)} de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)}`).join('\n')}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function renderFinanceiro(){const rows=pagamentos.filter(p=>String(p.data_vencimento).startsWith(mesFinanceiro)||String(p.data_recebimento||'').startsWith(mesFinanceiro));const recebido=rows.filter(p=>p.status==='recebido').reduce((s,p)=>s+Number(p.valor||0),0);const falta=rows.filter(p=>p.status!=='recebido').reduce((s,p)=>s+Number(p.valor||0),0);financeiro.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Financeiro — ${nomesMes[Number(mesFinanceiro.slice(5))-1].toUpperCase()} ${mesFinanceiro.slice(0,4)}</div><div class="monthNav"><button class="secondary" onclick="mesFinanceiro=monthAdd(mesFinanceiro,-1);renderFinanceiro()">← Mês anterior</button><button class="secondary" onclick="mesFinanceiro=monthAdd(mesFinanceiro,1);renderFinanceiro()">Próximo mês →</button></div></div><div class="studentGrid"><div class="card"><div class="mut">Arrecadado no mês</div><div class="money good">R$ ${recebido.toLocaleString('pt-BR')}</div></div><div class="card"><div class="mut">Falta receber</div><div class="money warn">R$ ${falta.toLocaleString('pt-BR')}</div></div><div class="card"><div class="mut">Previsão total</div><div class="money">R$ ${(recebido+falta).toLocaleString('pt-BR')}</div></div></div>${calendarHtml({tipo:'finance',mes:mesFinanceiro})}`}
function clickDiaFinanceiro(date){const rows=pagamentos.filter(p=>(p.data_recebimento||p.data_vencimento)===date||p.data_vencimento===date);if(!rows.length)return;modalHtml(`<div class="sectionTitle">Pagamentos de ${fmtData(date)}</div><div class="infoList">${rows.map(p=>`${alunoNome(p.aluno_id)}: R$ ${Number(p.valor||0).toLocaleString('pt-BR')} — ${p.status==='recebido'?'recebido':'a receber'}`).join('\n')}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function renderAjustes(){ajustes.innerHTML=`<div class="sectionTitle">Ajuste de horários</div><div class="card"><div class="formGrid"><div class="field"><label>Aluno</label><input id="cadNome" placeholder="Nome do aluno"></div><div class="field"><label>Quantos dias na semana</label><select id="cadFreq"><option value="1">1x semana</option><option value="2">2x semana</option><option value="3" selected>3x semana</option><option value="4">4x semana</option><option value="5">5x semana</option></select></div><div class="field"><label>Primeiro dia a partir de</label><input id="cadPrimeiro" type="date" value="${hojeISO()}"></div><div class="field"><label>Cobrança</label><select id="tipoCobranca" onchange="toggleCobranca()"><option value="aula">Por aula</option><option value="pacote" selected>Por pacote</option></select></div><div class="field cobrancaAula hidden"><label>Valor por aula</label><input id="cadValorAula" type="number" value="85"></div><div class="field cobrancaPacote"><label>Quantidade de aulas no pacote</label><input id="cadQtdPacote" type="number" value="12"></div><div class="field cobrancaPacote"><label>Valor do pacote</label><input id="cadValorPacote" type="number" value="960"></div><div class="field"><label>Data do primeiro pagamento</label><input id="cadPagamento" type="date" value="${hojeISO()}"></div><div class="field"><label>Local</label><input id="cadLocal" value="A definir"></div></div><label>Quais dias na semana</label><div class="weekBtns">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>`<button type="button" class="${[1,3,5].includes(i)?'on':''}" data-dia="${i}" onclick="this.classList.toggle('on')">${d}</button>`).join('')}</div><br><button onclick="salvarAluno()">Cadastrar aluno</button></div>`;toggleCobranca()}
function toggleCobranca(){const tipo=document.getElementById('tipoCobranca')?.value||'pacote';document.querySelectorAll('.cobrancaAula').forEach(e=>e.classList.toggle('hidden',tipo!=='aula'));document.querySelectorAll('.cobrancaPacote').forEach(e=>e.classList.toggle('hidden',tipo!=='pacote'))}
async function salvarAluno(){const nome=cadNome.value.trim();if(!nome)return alert('Digite o nome do aluno.');let {data:loc}=await sb.from('locais').select('id').eq('nome',cadLocal.value.trim()||'A definir').maybeSingle();if(!loc){const r=await sb.from('locais').insert({nome:cadLocal.value.trim()||'A definir'}).select('id').single();loc=r.data}const dias=[...document.querySelectorAll('.weekBtns button.on')].map(b=>b.dataset.dia);const tipo=tipoCobranca.value;await sb.from('alunos').insert({nome,local_id:loc.id,frequencia_semanal:Number(cadFreq.value),dias_semana:dias,primeiro_dia:cadPrimeiro.value,tipo_cobranca:tipo,valor_por_aula:Number(cadValorAula?.value||0),quantidade_aulas_plano:Number(cadQtdPacote?.value||0),valor_pacote:Number(cadValorPacote?.value||0),data_primeiro_pagamento:cadPagamento.value,ultimo_pagamento:cadPagamento.value,ativo:true});await carregarDados();alert('Aluno cadastrado.')}
checarSenha();carregarDados();
</script>
