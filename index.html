<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thayara Alencar - Personal Trainer</title>
<style>
:root{--bg:#0d0f14;--card:#171b24;--card2:#202637;--txt:#f6f3ef;--mut:#aab0bf;--line:#30384c;--acc:#f2b84b;--green:#48d17d;--green2:#1d8f50;--greenLight:#b9f6cf;--red:#ff6464;--blue:#4aa3ff;--soft:#f7f3ec}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0d0f14,#121722);color:var(--txt);font-family:Arial,Helvetica,sans-serif}.hidden{display:none!important}
header{position:sticky;top:0;z-index:5;background:rgba(13,15,20,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 14px;text-align:center}.logo{width:96px;height:96px;object-fit:contain;border-radius:22px;background:#f7f5f0;margin:0 auto 8px;display:block;border:1px solid rgba(242,184,75,.25)}h1{margin:0;font-size:21px;color:var(--acc);letter-spacing:.8px}.sub{margin-top:4px;color:var(--mut);font-size:13px;text-transform:uppercase;letter-spacing:4px}
main{max-width:980px;margin:0 auto;padding:14px}.tabs{position:sticky;top:160px;z-index:4;background:rgba(13,15,20,.96);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 0;margin-bottom:12px}.tab{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:14px;padding:12px 8px;font-weight:800;font-size:12px;cursor:pointer}.tab.active{background:var(--acc);color:#16110a;border-color:var(--acc)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title{font-weight:900;font-size:17px}.mut{color:var(--mut);font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:7px 10px;font-size:12px;color:var(--mut)}
button,input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:var(--card2);color:var(--txt);padding:11px;font-size:15px}button{background:var(--acc);color:#16110a;border:none;font-weight:900;cursor:pointer}.secondary{background:var(--card2);color:var(--txt);border:1px solid var(--line)}.doneBtn{background:var(--greenLight);color:#093d20}.doneBtn.checked{background:var(--green2);color:white}.danger{background:var(--red);color:white}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.done{opacity:.72}.done .title{text-decoration:line-through}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:10px}label{display:block;color:var(--mut);font-size:12px;margin:0 0 5px 2px}.sectionTitle{font-size:18px;font-weight:900;margin:4px 0 12px;color:var(--acc)}
.topLine{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.dayNav{display:flex;gap:7px}.dayNav button{padding:8px 10px;font-size:12px;white-space:nowrap}.studentGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stat{background:#11151f;border:1px solid var(--line);border-radius:14px;padding:10px}.stat b{display:block;font-size:16px}.bar{height:8px;background:#10141d;border-radius:99px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--green))}
.calendarHead{display:flex;justify-content:space-between;align-items:center;margin:10px 0;gap:10px}.monthNav{display:flex;gap:7px}.monthNav button{padding:8px 10px;font-size:12px}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.dow,.day{min-height:48px;border-radius:13px;border:1px solid var(--line);background:#11151f;padding:7px;font-size:12px}.dow{min-height:auto;text-align:center;color:var(--mut);background:transparent;border:none;font-weight:900}.day{cursor:pointer}.day:hover{border-color:var(--acc)}.dayNum{font-weight:900}.dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.dot{width:9px;height:9px;border-radius:50%;display:inline-block}.green{background:var(--green)}.red{background:var(--red)}.blue{background:var(--blue)}.money{font-size:24px;font-weight:900}.money.good{color:var(--green)}.money.warn{color:var(--acc)}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.weekBtns{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.weekBtns button{font-size:12px;padding:9px 4px;background:var(--card2);color:var(--mut);border:1px solid var(--line)}.weekBtns button.on{background:var(--acc);color:#16110a}.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:flex;align-items:flex-end;justify-content:center;z-index:20;padding:14px}.modalBox{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px}.infoList{line-height:1.55;white-space:pre-wrap}.smallBtn{width:auto;display:inline-block;padding:8px 11px;font-size:12px}.lockScreen{position:fixed;inset:0;background:linear-gradient(180deg,#0d0f14,#121722);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px}.lockBox{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,.35)}.lockBox img{width:120px;height:120px;object-fit:contain;border-radius:24px;background:#f7f5f0;margin:0 auto 10px;display:block}.lockBox h2{margin:6px 0 4px;color:var(--acc)}.lockError{min-height:18px;color:var(--red);font-size:13px;margin-top:8px}
@media(max-width:760px){.logo{width:82px;height:82px}.tabs{grid-template-columns:1fr 1fr;top:142px}.studentGrid,.formGrid{grid-template-columns:1fr}.statGrid{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.cal{gap:5px}.day{min-height:44px;padding:6px}.weekBtns{grid-template-columns:repeat(4,1fr)}.topLine,.calendarHead{align-items:flex-start;flex-direction:column}.dayNav,.monthNav{width:100%}}
</style>
</head>
<body>
<div id="lockScreen" class="lockScreen">
  <div class="lockBox">
    <img src="assets/logo-thayara.jpg" alt="Thayara Alencar">
    <h2>THAYARA ALENCAR</h2>
    <div class="mut">Personal Trainer</div>
    <br>
    <label>Senha</label>
    <input id="senhaEntrada" type="password" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') entrarPainel()">
    <br><br>
    <button onclick="entrarPainel()">Entrar</button>
    <div id="lockError" class="lockError"></div>
  </div>
</div>
<header>
<img class="logo" src="assets/logo-thayara.jpg" alt="Thayara Alencar">
<h1>THAYARA ALENCAR</h1>
<div class="sub">Personal Trainer</div>
</header>
<main>
<nav class="tabs">
<button class="tab active" data-tab="aulas" onclick="showTab('aulas')">AULAS DO DIA</button>
<button class="tab" data-tab="alunos" onclick="showTab('alunos')">RESUMO DOS ALUNOS</button>
<button class="tab" data-tab="calendario" onclick="showTab('calendario')">CALENDÁRIO</button>
<button class="tab" data-tab="financeiro" onclick="showTab('financeiro')">FINANCEIRO</button>
<button class="tab" data-tab="ajustes" onclick="showTab('ajustes')">AJUSTE DE HORÁRIOS</button>
</nav>
<section id="aulas"></section>
<section id="alunos" class="hidden"></section>
<section id="calendario" class="hidden"></section>
<section id="financeiro" class="hidden"></section>
<section id="ajustes" class="hidden"></section>
</main>

<div id="modal" class="modal hidden"><div class="modalBox" id="modalBox"></div></div>

<script>
const SENHA_PAINEL='THAY123';
function entrarPainel(){const v=(document.getElementById('senhaEntrada')?.value||'').trim();if(v===SENHA_PAINEL){sessionStorage.setItem('thayara_auth','1');document.getElementById('lockScreen').classList.add('hidden');return}document.getElementById('lockError').textContent='Senha incorreta.'}
function checarSenha(){if(sessionStorage.getItem('thayara_auth')==='1')document.getElementById('lockScreen').classList.add('hidden')}
checarSenha();
const alunos=[
{id:1,nome:'Julia',ultimo:'2026-05-01',plano:12,feitas:5,prox:'2026-06-01',freq:'3x semana',valorAula:75,valorPacote:850,local:'Academia Pulse'},
{id:2,nome:'Mariana',ultimo:'2026-05-05',plano:8,feitas:3,prox:'2026-06-05',freq:'2x semana',valorAula:90,valorPacote:680,local:'Condomínio Jardins'},
{id:3,nome:'Carlos',ultimo:'2026-04-28',plano:12,feitas:10,prox:'2026-05-28',freq:'3x semana',valorAula:80,valorPacote:900,local:'Praça das Flores'},
{id:4,nome:'Renata',ultimo:'2026-05-10',plano:4,feitas:1,prox:'2026-06-10',freq:'1x semana',valorAula:110,valorPacote:420,local:'Studio Thayara'}
];
let aulas=[
{id:101,alunoId:1,nome:'Julia',data:'2026-05-15',inicio:'07:00',fim:'08:00',status:'pendente'},
{id:102,alunoId:2,nome:'Mariana',data:'2026-05-15',inicio:'08:30',fim:'09:30',status:'pendente'},
{id:103,alunoId:3,nome:'Carlos',data:'2026-05-15',inicio:'17:00',fim:'18:00',status:'pendente'},
{id:104,alunoId:1,nome:'Julia',data:'2026-05-12',inicio:'07:00',fim:'08:00',status:'dada'},
{id:105,alunoId:1,nome:'Julia',data:'2026-05-14',inicio:'07:00',fim:'08:00',status:'remarcada',motivo:'Viagem da aluna',remarcadaPara:'2026-05-20 07:00'},
{id:106,alunoId:2,nome:'Mariana',data:'2026-05-13',inicio:'08:30',fim:'09:30',status:'dada'},
{id:107,alunoId:3,nome:'Carlos',data:'2026-05-16',inicio:'17:00',fim:'18:00',status:'pendente'},
{id:108,alunoId:4,nome:'Renata',data:'2026-05-17',inicio:'09:00',fim:'10:00',status:'pendente'},
{id:109,alunoId:2,nome:'Mariana',data:'2026-04-18',inicio:'08:30',fim:'09:30',status:'dada'},
{id:110,alunoId:3,nome:'Carlos',data:'2026-04-22',inicio:'17:00',fim:'18:00',status:'remarcada',motivo:'Chuva forte',remarcadaPara:'2026-04-24 17:00'},
{id:111,alunoId:1,nome:'Julia',data:'2026-06-03',inicio:'07:00',fim:'08:00',status:'pendente'},
{id:112,alunoId:4,nome:'Renata',data:'2026-06-06',inicio:'09:00',fim:'10:00',status:'pendente'}
];
const pagamentos=[
{aluno:'Carlos',data:'2026-04-28',valor:900,status:'recebido'},{aluno:'Julia',data:'2026-04-30',valor:850,status:'recebido'},{aluno:'Renata',data:'2026-04-10',valor:420,status:'recebido'},
{aluno:'Julia',data:'2026-05-01',valor:850,status:'recebido'},{aluno:'Mariana',data:'2026-05-05',valor:680,status:'recebido'},{aluno:'Renata',data:'2026-05-10',valor:420,status:'recebido'},{aluno:'Carlos',data:'2026-05-28',valor:900,status:'pendente'},
{aluno:'Julia',data:'2026-06-01',valor:850,status:'pendente'},{aluno:'Mariana',data:'2026-06-05',valor:680,status:'pendente'},{aluno:'Renata',data:'2026-06-10',valor:420,status:'pendente'},{aluno:'Carlos',data:'2026-06-28',valor:900,status:'pendente'}
];
let abaAtual='aulas', dataAulas='2026-05-15', mesFinanceiro='2026-05', remarcando=null;
const nomesMes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function fmtData(iso){const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`}
function tituloDia(iso){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d,12));const semana=new Intl.DateTimeFormat('pt-BR',{weekday:'long',timeZone:'UTC'}).format(dt);return `${String(d).padStart(2,'0')}/${nomesMes[m-1]} ${semana.charAt(0).toUpperCase()+semana.slice(1)}`}
function addDays(iso,n){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d+n,12));return dt.toISOString().slice(0,10)}
function addHour(h){let [hh,mm]=h.split(':').map(Number);hh=(hh+1)%24;return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}
function showTab(id){abaAtual=id;document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));renderAll()}
function renderAll(){renderAulas();renderAlunos();renderCalendario();renderFinanceiro();renderAjustes()}
function closeModal(){modal.classList.add('hidden');modalBox.innerHTML=''}
function modalHtml(html){modalBox.innerHTML=html;modal.classList.remove('hidden')}
function renderAulas(){const lista=aulas.filter(a=>a.data===dataAulas).sort((a,b)=>a.inicio.localeCompare(b.inicio));aulasEl=document.getElementById('aulas');aulasEl.innerHTML=`<div class="topLine"><div class="sectionTitle">Aulas do dia — ${tituloDia(dataAulas)}</div><div class="dayNav"><button class="secondary" onclick="dataAulas=addDays(dataAulas,-1);renderAulas()">← Dia anterior</button><button class="secondary" onclick="dataAulas=addDays(dataAulas,1);renderAulas()">Próximo dia →</button></div></div>`+(lista.length?lista.map(a=>`<div class="card ${a.status==='dada'?'done':''}"><div class="row"><div><div class="title">${a.nome}</div><div class="mut">de ${a.inicio} às ${a.fim}</div>${a.status==='remarcada'?`<div class="pill">Remarcada: ${a.motivo||''}</div>`:''}</div><span class="pill">${a.status.toUpperCase()}</span></div><div class="actions"><button class="doneBtn ${a.status==='dada'?'checked':''}" onclick="checkAula(${a.id})">✓ Aula dada</button><button class="secondary" onclick="openRemarcar(${a.id})">Remarcar</button></div></div>`).join(''):`<div class="card mut">Nenhuma aula cadastrada para este dia.</div>`)}
function checkAula(id){aulas=aulas.map(a=>a.id===id?{...a,status:'dada'}:a);renderAll()}
function openRemarcar(id){remarcando=aulas.find(a=>a.id===id);if(!remarcando)return;modalHtml(`<div class="sectionTitle">Remarcar aula</div><div class="mut">${remarcando.nome} — ${fmtData(remarcando.data)} de ${remarcando.inicio} às ${remarcando.fim}</div><br><div class="grid"><div class="field"><label>Novo dia</label><input type="date" id="novaData" value="${remarcando.data}"></div><div class="field"><label>Novo horário</label><input type="time" id="novaHora" value="${remarcando.inicio}"></div></div><div class="field"><label>Motivo</label><textarea id="motivo" rows="3" placeholder="Ex: aluno não conseguiu comparecer"></textarea></div><div class="actions"><button class="secondary" onclick="closeModal()">Cancelar</button><button onclick="confirmarRemarcacao()">Salvar remarcação</button></div>`)}
function confirmarRemarcacao(){if(!remarcando)return;const motivoTxt=document.getElementById('motivo').value.trim()||'Sem motivo informado';const nd=document.getElementById('novaData').value;const nh=document.getElementById('novaHora').value;aulas=aulas.map(a=>a.id===remarcando.id?{...a,status:'remarcada',motivo:motivoTxt,remarcadaPara:`${nd} ${nh}`}:a);aulas.push({id:Date.now(),alunoId:remarcando.alunoId,nome:remarcando.nome,data:nd,inicio:nh,fim:addHour(nh),status:'pendente'});closeModal();renderAll()}
function renderAlunos(){alunosEl=document.getElementById('alunos');alunosEl.innerHTML=`<div class="sectionTitle">Resumo dos alunos</div><div class="studentGrid">`+alunos.map(a=>{const faltam=a.plano-a.feitas;return `<div class="card"><div class="title">${a.nome}</div><div class="mut">${a.local}</div><div class="statGrid"><div class="stat"><span class="mut">Último pagamento</span><b>${fmtData(a.ultimo)}</b></div><div class="stat"><span class="mut">Plano</span><b>${a.plano} aulas</b></div><div class="stat"><span class="mut">Frequência</span><b>${a.freq}</b></div><div class="stat"><span class="mut">Já foram</span><b>${a.feitas}</b></div><div class="stat"><span class="mut">Faltam</span><b>${faltam}</b></div><div class="stat"><span class="mut">Próx. pagamento</span><b>${fmtData(a.prox)}</b></div></div><div class="bar"><span style="width:${Math.round((a.feitas/a.plano)*100)}%"></span></div></div>`}).join('')+`</div>`}
function renderCalendario(){const atual=Number(document.getElementById('selAluno')?.value||1);calendario.innerHTML=`<div class="sectionTitle">Calendário do aluno</div><div class="card"><label>Selecionar aluno</label><select id="selAluno" onchange="renderCalendario()">${alunos.map(a=>`<option value="${a.id}" ${atual===a.id?'selected':''}>${a.nome}</option>`).join('')}</select></div>${calendarHtml({alunoId:atual,tipo:'student',mes:'2026-05'})}`}
function calendarHtml({alunoId=0,tipo='student',mes='2026-05'}={}){const [yy,mm]=mes.split('-').map(Number);const days=new Date(yy,mm,0).getDate();const first=new Date(`${mes}-01T12:00:00`).getDay();const names=['D','S','T','Q','Q','S','S'];const legenda=tipo==='finance'?'<span class="pill"><i class="dot green"></i>Recebido</span> <span class="pill"><i class="dot red"></i>A receber</span>':'<span class="pill"><i class="dot green"></i>Dada</span> <span class="pill"><i class="dot red"></i>Remarcada/perdida</span> <span class="pill"><i class="dot blue"></i>Pendente</span>';let html=`<div class="card"><div class="calendarHead"><div class="title">${nomesMes[mm-1].toUpperCase()} ${yy}</div><div>${legenda}</div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${mes}-${String(d).padStart(2,'0')}`;let dots=[];if(tipo==='student'){dots=aulas.filter(a=>a.alunoId===alunoId&&a.data===date).map(a=>a.status==='dada'?'green':a.status==='remarcada'?'red':'blue')}else{dots=pagamentos.filter(p=>p.data===date).map(p=>p.status==='recebido'?'green':'red')}html+=`<div class="day" onclick="${tipo==='student'?`clickDiaAluno('${date}',${alunoId})`:`clickDiaFinanceiro('${date}')`}"><div class="dayNum">${d}</div><div class="dots">${dots.map(c=>`<span class="dot ${c}"></span>`).join('')}</div></div>`}return html+'</div></div>'}
function clickDiaAluno(date,alunoId){const lista=aulas.filter(a=>a.alunoId===alunoId&&a.data===date);if(!lista.length)return;const pend=lista.find(a=>a.status==='pendente');if(pend){modalHtml(`<div class="sectionTitle">Aula pendente</div><div class="infoList">${pend.nome}\n${fmtData(pend.data)} de ${pend.inicio} às ${pend.fim}</div><br><button onclick="closeModal();openRemarcar(${pend.id})">Deseja remarcar?</button><br><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}const red=lista.find(a=>a.status==='remarcada');if(red){modalHtml(`<div class="sectionTitle">Aula remarcada / falta</div><div class="infoList">Aluno: ${red.nome}\nData original: ${fmtData(red.data)} de ${red.inicio} às ${red.fim}\nMotivo: ${red.motivo||'Não informado'}\nRemarcada para: ${red.remarcadaPara||'Ainda não definida'}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}modalHtml(`<div class="sectionTitle">Aula dada</div><div class="infoList">${lista.map(a=>`${a.nome} — ${fmtData(a.data)} de ${a.inicio} às ${a.fim}`).join('\n')}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function monthAdd(mes,n){const [y,m]=mes.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1+n,1,12));return dt.toISOString().slice(0,7)}
function renderFinanceiro(){const rows=pagamentos.filter(p=>p.data.startsWith(mesFinanceiro));const recebido=rows.filter(p=>p.status==='recebido').reduce((s,p)=>s+p.valor,0);const falta=rows.filter(p=>p.status!=='recebido').reduce((s,p)=>s+p.valor,0);financeiro.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Financeiro — ${nomesMes[Number(mesFinanceiro.slice(5))-1].toUpperCase()} ${mesFinanceiro.slice(0,4)}</div><div class="monthNav"><button class="secondary" onclick="mesFinanceiro=monthAdd(mesFinanceiro,-1);renderFinanceiro()">← Mês anterior</button><button class="secondary" onclick="mesFinanceiro=monthAdd(mesFinanceiro,1);renderFinanceiro()">Próximo mês →</button></div></div><div class="studentGrid"><div class="card"><div class="mut">Arrecadado no mês</div><div class="money good">R$ ${recebido.toLocaleString('pt-BR')}</div></div><div class="card"><div class="mut">Falta receber</div><div class="money warn">R$ ${falta.toLocaleString('pt-BR')}</div></div><div class="card"><div class="mut">Previsão total</div><div class="money">R$ ${(recebido+falta).toLocaleString('pt-BR')}</div></div></div>${calendarHtml({tipo:'finance',mes:mesFinanceiro})}`}
function clickDiaFinanceiro(date){const rows=pagamentos.filter(p=>p.data===date);if(!rows.length)return;modalHtml(`<div class="sectionTitle">Pagamentos de ${fmtData(date)}</div><div class="infoList">${rows.map(p=>`${p.aluno}: R$ ${p.valor.toLocaleString('pt-BR')} — ${p.status==='recebido'?'recebido':'a receber'}`).join('\n')}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function renderAjustes(){ajustes.innerHTML=`<div class="sectionTitle">Ajuste de horários</div><div class="card"><div class="formGrid"><div class="field"><label>Aluno</label><input placeholder="Nome do aluno" value="Bianca"></div><div class="field"><label>Quantos dias na semana</label><select><option>1x semana</option><option>2x semana</option><option selected>3x semana</option><option>4x semana</option><option>5x semana</option></select></div><div class="field"><label>Primeiro dia a partir de</label><input type="date" value="2026-05-20"></div><div class="field"><label>Cobrança</label><select id="tipoCobranca" onchange="toggleCobranca()"><option value="aula">Por aula</option><option value="pacote" selected>Por pacote</option></select></div><div class="field cobrancaAula hidden"><label>Valor por aula</label><input type="number" value="85"></div><div class="field cobrancaPacote"><label>Quantidade de aulas no pacote</label><input type="number" value="12"></div><div class="field cobrancaPacote"><label>Valor do pacote</label><input type="number" value="900"></div><div class="field"><label>Data do primeiro pagamento</label><input type="date" value="2026-05-20"></div><div class="field"><label>Local</label><input value="Studio Thayara"></div></div><label>Quais dias na semana</label><div class="weekBtns">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>`<button class="${[1,3,5].includes(i)?'on':''}" onclick="this.classList.toggle('on')">${d}</button>`).join('')}</div><br><button>Cadastrar / atualizar aluno</button></div>`;toggleCobranca()}
function toggleCobranca(){const tipo=document.getElementById('tipoCobranca')?.value||'pacote';document.querySelectorAll('.cobrancaAula').forEach(e=>e.classList.toggle('hidden',tipo!=='aula'));document.querySelectorAll('.cobrancaPacote').forEach(e=>e.classList.toggle('hidden',tipo!=='pacote'))}
renderAll();
</script>
</body>
</html>
