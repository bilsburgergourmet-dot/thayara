<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thayara Alencar - Personal Trainer</title>
  <style>
    :root{--bg:#0d0f14;--card:#171b24;--card2:#202637;--txt:#f6f3ef;--mut:#aab0bf;--line:#30384c;--acc:#f2b84b;--green:#48d17d;--red:#ff6464;--blue:#4aa3ff;--pink:#e879f9}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0d0f14,#121722);color:var(--txt);font-family:Arial,Helvetica,sans-serif}.hidden{display:none!important}
    header{position:sticky;top:0;z-index:5;background:rgba(13,15,20,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 14px;text-align:center}
    h1{margin:0;font-size:19px;color:var(--acc);letter-spacing:.2px}.sub{margin-top:4px;color:var(--mut);font-size:12px}
    main{max-width:980px;margin:0 auto;padding:14px}.tabs{position:sticky;top:73px;z-index:4;background:rgba(13,15,20,.94);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 0;margin-bottom:12px}
    .tab{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:14px;padding:12px 8px;font-weight:800;font-size:12px;cursor:pointer}.tab.active{background:var(--acc);color:#16110a;border-color:var(--acc)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title{font-weight:900;font-size:17px}.mut{color:var(--mut);font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:7px 10px;font-size:12px;color:var(--mut)}
    button,input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:var(--card2);color:var(--txt);padding:11px;font-size:15px}button{background:var(--acc);color:#16110a;border:none;font-weight:900;cursor:pointer}.secondary{background:var(--card2);color:var(--txt);border:1px solid var(--line)}.danger{background:var(--red);color:white}.ok{background:var(--green);color:#062112}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.done{opacity:.65}.done .title{text-decoration:line-through}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:10;padding:14px}.modalBox{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:10px}label{display:block;color:var(--mut);font-size:12px;margin:0 0 5px 2px}.sectionTitle{font-size:18px;font-weight:900;margin:4px 0 12px;color:var(--acc)}
    .studentGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stat{background:#11151f;border:1px solid var(--line);border-radius:14px;padding:10px}.stat b{display:block;font-size:16px}.bar{height:8px;background:#10141d;border-radius:99px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--green))}
    .calendarHead{display:flex;justify-content:space-between;align-items:center;margin:10px 0}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.dow,.day{min-height:48px;border-radius:13px;border:1px solid var(--line);background:#11151f;padding:7px;font-size:12px}.dow{min-height:auto;text-align:center;color:var(--mut);background:transparent;border:none;font-weight:900}.dayNum{font-weight:900}.dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.dot{width:9px;height:9px;border-radius:50%}.green{background:var(--green)}.red{background:var(--red)}.blue{background:var(--blue)}.money{font-size:24px;font-weight:900}.money.good{color:var(--green)}.money.warn{color:var(--acc)}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.weekBtns{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.weekBtns button{font-size:12px;padding:9px 4px;background:var(--card2);color:var(--mut);border:1px solid var(--line)}.weekBtns button.on{background:var(--acc);color:#16110a}
    @media(max-width:760px){.tabs{grid-template-columns:1fr 1fr;top:70px}.studentGrid,.formGrid{grid-template-columns:1fr}.statGrid{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.cal{gap:5px}.day{min-height:44px;padding:6px}.weekBtns{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<header>
  <h1>THAYARA ALENCAR - Personal Trainer</h1>
  <div class="sub">Piloto visual de gestão de aulas, alunos e financeiro</div>
</header>
<main>
  <nav class="tabs">
    <button class="tab active" onclick="showTab('aulas')">AULAS DO DIA</button>
    <button class="tab" onclick="showTab('alunos')">RESUMO DOS ALUNOS</button>
    <button class="tab" onclick="showTab('calendario')">CALENDÁRIO</button>
    <button class="tab" onclick="showTab('financeiro')">FINANCEIRO</button>
    <button class="tab" onclick="showTab('ajustes')">AJUSTE DE HORÁRIOS</button>
  </nav>

  <section id="aulas"></section>
  <section id="alunos" class="hidden"></section>
  <section id="calendario" class="hidden"></section>
  <section id="financeiro" class="hidden"></section>
  <section id="ajustes" class="hidden"></section>
</main>

<div id="modal" class="modal hidden">
  <div class="modalBox">
    <div class="sectionTitle">Remarcar aula</div>
    <div class="mut" id="modalInfo"></div><br>
    <div class="grid">
      <div class="field"><label>Novo dia</label><input type="date" id="novaData"></div>
      <div class="field"><label>Novo horário</label><input type="time" id="novaHora"></div>
    </div>
    <div class="field"><label>Motivo</label><textarea id="motivo" rows="3" placeholder="Ex: aluno não conseguiu comparecer"></textarea></div>
    <div class="actions"><button class="secondary" onclick="closeModal()">Cancelar</button><button onclick="confirmarRemarcacao()">Salvar remarcação</button></div>
  </div>
</div>

<script>
const alunos=[
  {id:1,nome:'Julia',ultimo:'2026-05-01',plano:12,feitas:5,prox:'2026-06-01',freq:'3x semana',valor:75,local:'Academia Pulse',dias:['seg','qua','sex']},
  {id:2,nome:'Mariana',ultimo:'2026-05-05',plano:8,feitas:3,prox:'2026-06-05',freq:'2x semana',valor:90,local:'Condomínio Jardins',dias:['ter','qui']},
  {id:3,nome:'Carlos',ultimo:'2026-04-28',plano:12,feitas:10,prox:'2026-05-28',freq:'3x semana',valor:80,local:'Praça das Flores',dias:['seg','qua','sex']},
  {id:4,nome:'Renata',ultimo:'2026-05-10',plano:4,feitas:1,prox:'2026-06-10',freq:'1x semana',valor:110,local:'Studio Thayara',dias:['sab']}
];
let aulas=[
  {id:101,alunoId:1,nome:'Julia',data:'2026-05-15',inicio:'07:00',fim:'08:00',status:'pendente'},
  {id:102,alunoId:2,nome:'Mariana',data:'2026-05-15',inicio:'08:30',fim:'09:30',status:'pendente'},
  {id:103,alunoId:3,nome:'Carlos',data:'2026-05-15',inicio:'17:00',fim:'18:00',status:'pendente'},
  {id:104,alunoId:1,nome:'Julia',data:'2026-05-12',inicio:'07:00',fim:'08:00',status:'dada'},
  {id:105,alunoId:1,nome:'Julia',data:'2026-05-14',inicio:'07:00',fim:'08:00',status:'remarcada',motivo:'Viagem da aluna'},
  {id:106,alunoId:2,nome:'Mariana',data:'2026-05-13',inicio:'08:30',fim:'09:30',status:'dada'},
  {id:107,alunoId:3,nome:'Carlos',data:'2026-05-16',inicio:'17:00',fim:'18:00',status:'pendente'},
  {id:108,alunoId:4,nome:'Renata',data:'2026-05-17',inicio:'09:00',fim:'10:00',status:'pendente'}
];
let remarcando=null;
const fmt=d=>{const [y,m,day]=d.split('-');return `${day}/${m}/${y}`};
function showTab(id){document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('.tab')].find(b=>b.textContent.toLowerCase().includes(id==='aulas'?'aulas':id==='alunos'?'resumo':id))?.classList.add('active');renderAll()}
function renderAll(){renderAulas();renderAlunos();renderCalendario();renderFinanceiro();renderAjustes()}
function renderAulas(){const today='2026-05-15';const lista=aulas.filter(a=>a.data===today).sort((a,b)=>a.inicio.localeCompare(b.inicio));aulasEl=document.getElementById('aulas');aulasEl.innerHTML=`<div class="sectionTitle">Aulas do dia — ${fmt(today)}</div>`+lista.map(a=>`<div class="card ${a.status==='dada'?'done':''}"><div class="row"><div><div class="title">${a.nome}</div><div class="mut">de ${a.inicio} às ${a.fim}</div>${a.status==='remarcada'?`<div class="pill">Remarcada: ${a.motivo||''}</div>`:''}</div><span class="pill">${a.status.toUpperCase()}</span></div><div class="actions"><button class="ok" onclick="checkAula(${a.id})">✓ Aula dada</button><button class="secondary" onclick="openRemarcar(${a.id})">Remarcar</button></div></div>`).join('')}
function checkAula(id){aulas=aulas.map(a=>a.id===id?{...a,status:'dada'}:a);renderAll()}
function openRemarcar(id){remarcando=aulas.find(a=>a.id===id);modalInfo.textContent=`${remarcando.nome} — ${fmt(remarcando.data)} de ${remarcando.inicio} às ${remarcando.fim}`;novaData.value=remarcando.data;novaHora.value=remarcando.inicio;motivo.value='';modal.classList.remove('hidden')}
function closeModal(){modal.classList.add('hidden');remarcando=null}
function confirmarRemarcacao(){if(!remarcando)return;const motivoTxt=motivo.value.trim()||'Sem motivo informado';aulas=aulas.map(a=>a.id===remarcando.id?{...a,status:'remarcada',motivo:motivoTxt}:a);aulas.push({id:Date.now(),alunoId:remarcando.alunoId,nome:remarcando.nome,data:novaData.value,inicio:novaHora.value,fim:addHour(novaHora.value),status:'pendente'});closeModal();renderAll()}
function addHour(h){let [hh,mm]=h.split(':').map(Number);hh=(hh+1)%24;return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}
function renderAlunos(){alunosEl=document.getElementById('alunos');alunosEl.innerHTML=`<div class="sectionTitle">Resumo dos alunos</div><div class="studentGrid">`+alunos.map(a=>{const faltam=a.plano-a.feitas;return `<div class="card"><div class="title">${a.nome}</div><div class="mut">${a.local}</div><div class="statGrid"><div class="stat"><span class="mut">Último pagamento</span><b>${fmt(a.ultimo)}</b></div><div class="stat"><span class="mut">Plano</span><b>${a.plano} aulas</b></div><div class="stat"><span class="mut">Frequência</span><b>${a.freq}</b></div><div class="stat"><span class="mut">Já foram</span><b>${a.feitas}</b></div><div class="stat"><span class="mut">Faltam</span><b>${faltam}</b></div><div class="stat"><span class="mut">Próx. pagamento</span><b>${fmt(a.prox)}</b></div></div><div class="bar"><span style="width:${Math.round((a.feitas/a.plano)*100)}%"></span></div></div>`}).join('')+`</div>`}
function renderCalendario(){calendario.innerHTML=`<div class="sectionTitle">Calendário do aluno</div><div class="card"><label>Selecionar aluno</label><select id="selAluno" onchange="renderCalendario()">${alunos.map(a=>`<option value="${a.id}" ${Number(selAluno?.value||1)===a.id?'selected':''}>${a.nome}</option>`).join('')}</select></div>${calendarHtml(Number(selAluno?.value||1),'student')}`}
function calendarHtml(alunoId,type){const month='2026-05';const days=31;const first=new Date('2026-05-01T12:00:00').getDay();const names=['D','S','T','Q','Q','S','S'];let html=`<div class="card"><div class="calendarHead"><div class="title">Maio 2026</div><div><span class="pill"><i class="dot green"></i>Dada</span> <span class="pill"><i class="dot red"></i>Remarcada/perdida</span> <span class="pill"><i class="dot blue"></i>Pendente</span></div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${month}-${String(d).padStart(2,'0')}`;let dots=[];if(type==='student'){dots=aulas.filter(a=>a.alunoId===alunoId&&a.data===date).map(a=>a.status==='dada'?'green':a.status==='remarcada'?'red':'blue')}else{const receb=alunos.filter(a=>a.ultimo===date).length;const falta=alunos.filter(a=>a.prox===date).length;dots=[...Array(receb).fill('green'),...Array(falta).fill('red')]}html+=`<div class="day"><div class="dayNum">${d}</div><div class="dots">${dots.map(c=>`<span class="dot ${c}"></span>`).join('')}</div></div>`}return html+'</div></div>'}
function renderFinanceiro(){const recebido=alunos.reduce((s,a)=>s+a.feitas*a.valor,0);const falta=alunos.reduce((s,a)=>s+(a.plano-a.feitas)*a.valor,0);financeiro.innerHTML=`<div class="sectionTitle">Financeiro</div><div class="studentGrid"><div class="card"><div class="mut">Arrecadado no mês</div><div class="money good">R$ ${recebido.toLocaleString('pt-BR')}</div></div><div class="card"><div class="mut">Falta receber</div><div class="money warn">R$ ${falta.toLocaleString('pt-BR')}</div></div><div class="card"><div class="mut">Previsão total</div><div class="money">R$ ${(recebido+falta).toLocaleString('pt-BR')}</div></div></div>${calendarHtml(0,'finance')}`}
function renderAjustes(){ajustes.innerHTML=`<div class="sectionTitle">Ajuste de horários</div><div class="card"><div class="formGrid"><div class="field"><label>Aluno</label><input placeholder="Nome do aluno" value="Bianca"></div><div class="field"><label>Quantos dias na semana</label><select><option>1x semana</option><option>2x semana</option><option selected>3x semana</option><option>4x semana</option><option>5x semana</option></select></div><div class="field"><label>Primeiro dia a partir de</label><input type="date" value="2026-05-20"></div><div class="field"><label>Valor por aula</label><input type="number" value="85"></div><div class="field"><label>Data do primeiro pagamento</label><input type="date" value="2026-05-20"></div><div class="field"><label>Local</label><input value="Studio Thayara"></div></div><label>Quais dias na semana</label><div class="weekBtns">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>`<button class="${[1,3,5].includes(i)?'on':''}" onclick="this.classList.toggle('on')">${d}</button>`).join('')}</div><br><button>Cadastrar / atualizar aluno</button></div>`}
renderAll();
</script>
</body>
</html>
