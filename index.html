const SENHA_PAINEL='thay123';

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let alunos=[],aulas=[],pagamentos=[],locais=[],abaAtual='aulas',mesDashboard=hojeISO().slice(0,7),dataAulas=hojeISO(),mesResumo=hojeISO().slice(0,7),mesCalendario=hojeISO().slice(0,7),mesFinanceiro=hojeISO().slice(0,7),mesCadastro=hojeISO().slice(0,7),mesAjuste=hojeISO().slice(0,7),remarcando=null,swipeStartX=0,swipeMoved=false,swipeFinanceStartX=0,swipeCadastroStartX=0,swipeAjusteStartX=0,cadastroAjustes={},ajusteAjustes={},cadastroHoras={},ajusteHoras={},edHoras={},relatorioIndex=0,calFiltros=[],alertaRenovacaoChecado=false,aulasPopupChecado=false;

function hojeISO(){const d=new Date();return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Fortaleza',year:'numeric',month:'2-digit',day:'2-digit'}).format(d)}
function fmtData(iso){if(!iso)return'';const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`}
function tituloDia(iso){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d,12));const semana=new Intl.DateTimeFormat('pt-BR',{weekday:'long',timeZone:'UTC'}).format(dt);return `${String(d).padStart(2,'0')}/${nomesMes[m-1]} ${semana.charAt(0).toUpperCase()+semana.slice(1)}`}
function addDays(iso,n){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d+n,12));return dt.toISOString().slice(0,10)}
function addHour(h){let [hh,mm]=String(h||'07:00').slice(0,5).split(':').map(Number);hh=(hh+1)%24;return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}
function monthAdd(mes,n){const [y,m]=mes.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1+n,1,12));return dt.toISOString().slice(0,7)}
function statusGrupo(s){return s==='dada'?'dada':(s==='remarcada'||s==='perdida'||s==='cancelada')?'remarcada':'pendente'}

function statusLabel(s){if(s==='pendente_remarcar')return 'PENDENTE P/ REMARCAR';const g=statusGrupo(s);return g==='dada'?'DADA':g==='remarcada'?'REMARCADA':'PENDENTE'}

window.alert=aviso

async function carregarDados(){globalStatus.textContent='Carregando dados...';const [ra,ru,rp,rl]=await Promise.all([sb.from('alunos').select('*,locais(nome)').order('nome'),sb.from('aulas').select('*').order('data_aula'),sb.from('pagamentos').select('*').order('data_vencimento'),sb.from('locais').select('*').order('nome')]);if(ra.error||ru.error||rp.error||rl.error){globalStatus.textContent='Erro ao carregar dados do Supabase.';console.error(ra.error||ru.error||rp.error||rl.error);return}alunos=ra.data||[];aulas=ru.data||[];pagamentos=rp.data||[];locais=rl.data||[];await normalizarVencimentosPlanos();globalStatus.classList.add('hidden');renderAll();mostrarPopupRenovacoes()}
async function normalizarVencimentosPlanos(){const ajustes=pagamentos.filter(p=>p.data_fim_prevista&&p.data_vencimento!==p.data_fim_prevista);if(!ajustes.length)return;await Promise.all(ajustes.map(p=>sb.from('pagamentos').update({data_vencimento:p.data_fim_prevista}).eq('id',p.id)));ajustes.forEach(p=>p.data_vencimento=p.data_fim_prevista)}

async function localIdPorNome(nome){nome=(nome||'A definir').trim()||'A definir';let loc=locais.find(l=>String(l.nome).toLowerCase()===nome.toLowerCase());if(loc)return loc.id;let {data}=await sb.from('locais').select('id,nome').eq('nome',nome).maybeSingle();if(!data){const r=await sb.from('locais').insert({nome}).select('id,nome').single();data=r.data}if(data)locais.push(data);return data?.id||null}
function datasComAula(){return [...new Set(aulas.map(a=>a.data_aula).filter(Boolean))].sort()}
function dataComAula(ref,dir=1,inclusive=false){const ds=datasComAula();return dir>0?ds.find(d=>inclusive?d>=ref:d>ref):[...ds].reverse().find(d=>inclusive?d<=ref:d<ref)}

function detalheHistoricoAula(id){const a=aulas.find(x=>x.id===id);if(!a)return;modalHtml(`<div class="sectionTitle">${String(a.status).toUpperCase()} — ${alunoNome(a.aluno_id)}</div><div class="infoList">Data original: ${fmtData(a.data_aula)} de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)}\nRemarcada para: ${a.remarcada_para_data?fmtData(a.remarcada_para_data)+' '+String(a.remarcada_para_hora||'').slice(0,5):'Ainda não definida'}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}

function mediaFmt(n){return Number(n||0).toFixed(1).replace('.',',')}
function dashboardDiaSemanaStats(lista){const nomes=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];const porData={};lista.forEach(a=>{porData[a.data_aula]=(porData[a.data_aula]||0)+1});const porSemana=[0,1,2,3,4,5,6].map(i=>{const dias=Object.entries(porData).filter(([data])=>{const [y,m,d]=data.split('-').map(Number);return new Date(Date.UTC(y,m-1,d,12)).getUTCDay()===i}).map(([,q])=>q);const media=dias.length?dias.reduce((s,q)=>s+q,0)/dias.length:0;return {i,nome:nomes[i],media,dias:dias.length}}).filter(x=>x.dias>0);const maior=[...porSemana].sort((a,b)=>b.media-a.media)[0];const menor=[...porSemana].sort((a,b)=>a.media-b.media)[0];const geral=Object.values(porData);const media=geral.length?geral.reduce((s,q)=>s+q,0)/geral.length:0;return {maior,menor,media}}
function dataPrevistaPagamento(p){return p.data_vencimento||p.data_fim_prevista||p.data_inicio_plano||''}
function renderDashboard(){const el=document.getElementById('dashboard');if(!el)return;const rows=pagamentos.filter(p=>String(dataPrevistaPagamento(p)).startsWith(mesDashboard));const faturamento=rows.reduce((s,p)=>s+Number(p.valor||0),0);const faturamentoAnterior=faturamentoMes(monthAdd(mesDashboard,-1));const crescimento=crescimentoHtml(faturamento,faturamentoAnterior);const aulasHoje=aulas.filter(a=>a.data_aula===hojeISO()).sort((a,b)=>String(a.hora_inicio).localeCompare(String(b.hora_inicio)));const aulasMes=dashboardAulasMes();const dadas=aulasMes.filter(a=>a.status==='dada');const pendentes=aulasMes.filter(a=>a.status!=='dada');const perto=activeAlunos().map(a=>planoAtualAluno(a.id)).filter(pl=>pl.pagamento&&pl.faltamQtd<5).sort((a,b)=>a.faltamQtd-b.faltamQtd);const stats=dashboardDiaSemanaStats(aulasMes);const ticket=rows.length?faturamento/rows.length:0;const recebidos=rows.filter(p=>p.status==='recebido').reduce((s,p)=>s+Number(p.valor||0),0);el.innerHTML=`<div class="calendarHead"><div><div class="sectionTitle">Dashboard</div><div class="mut">Visão geral do mês selecionado</div></div><div class="monthNav"><button class="secondary" onclick="mesDashboard=monthAdd(mesDashboard,-1);renderDashboard()">← Mês anterior</button><button class="secondary" onclick="mesDashboard=monthAdd(mesDashboard,1);renderDashboard()">Próximo mês →</button></div></div><div class="card"><label>Selecionar mês</label><input type="month" value="${mesDashboard}" onchange="mesDashboard=this.value;renderDashboard()"></div><div class="studentGrid"><div class="card stat"><span class="mut">Faturamento previsto</span><div class="money">${dinheiro(faturamento)} ${crescimento}</div><div class="mut">Comparado ao mês anterior: ${dinheiro(faturamentoAnterior)}</div></div><div class="card stat"><span class="mut">Recebido / em aberto</span><div class="money good">${dinheiro(recebidos)}</div><div class="mut">Aberto: ${dinheiro(faturamento-recebidos)}</div></div><div class="card stat"><span class="mut">Aulas de hoje</span><div class="money">${aulasHoje.length}</div><div class="mut">${tituloDia(hojeISO())}</div></div><div class="card stat"><span class="mut">Aulas no mês</span><div class="money">${aulasMes.length}</div><div class="mut">${dadas.length} dadas · ${pendentes.length} pendentes</div></div><div class="card stat"><span class="mut">Planos perto de acabar</span><div class="money warn">${perto.length}</div><div class="mut">Faltando menos de 5 aulas</div></div><div class="card stat"><span class="mut">Ticket médio</span><div class="money">${dinheiro(ticket)}</div><div class="mut">Média por pagamento previsto</div></div></div><div class="studentGrid"><div class="card"><div class="sectionTitle">Aulas de hoje</div>${aulasHoje.length?aulasHoje.map(a=>`<div class="payRow"><div><b>${String(a.hora_inicio).slice(0,5)} — ${alunoNome(a.aluno_id)}</b><div class="mut">${localAula(a)} · ${statusLabel(a.status)}</div></div><button class="secondary" onclick="showTab('aulas')">Ver</button></div>`).join(''):'<div class="mut">Nenhuma aula hoje.</div>'}</div><div class="card"><div class="sectionTitle">Planos perto de acabar</div>${perto.length?perto.map(pl=>`<div class="payRow"><div><b>${pl.aluno.nome}</b><div class="mut">Faltam ${pl.faltamQtd} aula(s) · ${pl.mesNome}</div></div><button onclick="showTab('ajustes')">Renovar</button></div>`).join(''):'<div class="mut">Nenhum plano perto de acabar.</div>'}</div></div><div class="card"><div class="sectionTitle">Distribuição por semana</div><div class="infoList">Dia com mais aulas: ${stats.maior?`${stats.maior.nome} (${mediaFmt(stats.maior.media)})`:'-'}\nDia com menos aulas: ${stats.menor?`${stats.menor.nome} (${mediaFmt(stats.menor.media)})`:'-'}\nMédia geral por dia com aula: ${mediaFmt(stats.media)}</div></div>`}
function renderAulas(){let lista=aulas.filter(a=>a.data_aula===dataAulas).sort((a,b)=>String(a.hora_inicio).localeCompare(String(b.hora_inicio)));const el=document.getElementById('aulas');if(!lista.length){const prox=dataComAula(dataAulas,1,true)||dataComAula(dataAulas,-1,false);if(prox){dataAulas=prox;lista=aulas.filter(a=>a.data_aula===dataAulas).sort((a,b)=>String(a.hora_inicio).localeCompare(String(b.hora_inicio)))}}const anterior=dataComAula(dataAulas,-1,false);const proximo=dataComAula(dataAulas,1,false);const futuro=dataAulas>hojeISO();el.innerHTML=`<div class="topLine"><div><div class="sectionTitle">Aulas do dia</div><div class="mut">${tituloDia(dataAulas)}</div></div><div class="dayNav">${anterior?`<button class="secondary" onclick="navegarAulas('${anterior}')">← Dia anterior</button>`:''}${proximo?`<button class="secondary" onclick="navegarAulas('${proximo}')">Próximo dia →</button>`:''}</div></div>`+(lista.length?lista.map(a=>{const botaoDada=(futuro&&a.status!=='dada')?'':`<button class="doneBtn ${a.status==='dada'?'checked':''}" onclick="toggleAulaDada('${a.id}')">${a.status==='dada'?'↩ Desmarcar':'✓ Aula dada'}</button>`;const hist=['remarcada','perdida','cancelada'].includes(a.status);const cls=`status-${statusGrupo(a.status)}`;return `<div class="card lessonCard ${cls} ${a.status==='dada'?'done':''}" ${hist?`onclick="detalheHistoricoAula('${a.id}')" style="cursor:pointer"`:''}><div class="lessonMain"><div><div class="lessonName">${alunoNome(a.aluno_id)}</div><div class="lessonTime">${String(a.hora_inicio).slice(0,5)} – ${String(a.hora_fim).slice(0,5)}</div><div class="lessonMeta"><span class="miniTag">📍 ${localAula(a)}</span><span class="miniTag">${diaSemanaCurto(a.data_aula)}</span></div></div><span class="pill statusPill ${cls}">${statusLabel(a.status)}</span></div><div class="lessonActions" onclick="event.stopPropagation()">${botaoDada}<button class="secondary" onclick="openRemarcar('${a.id}')">Alterar</button></div></div>`}).join(''):`<div class="card mut">Nenhuma aula cadastrada.</div>`)}

function agoraFortaleza(){const parts=new Intl.DateTimeFormat('en-CA',{timeZone:'America/Fortaleza',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date());return Object.fromEntries(parts.map(p=>[p.type,p.value]))}
function aulasAtrasadasHoje(){const ag=agoraFortaleza();const hoje=`${ag.year}-${ag.month}-${ag.day}`;const min=Number(ag.hour)*60+Number(ag.minute);return aulas.filter(a=>a.data_aula===hoje&&a.status==='pendente'&&toMin(a.hora_fim||addHour(a.hora_inicio))<min).sort((a,b)=>String(a.hora_inicio).localeCompare(String(b.hora_inicio)))}
function mostrarPopupAulasAtrasadas(){if(aulasPopupChecado||abaAtual!=='aulas')return;aulasPopupChecado=true;const lista=aulasAtrasadasHoje();if(!lista.length)return;modalHtml(`<div class="sectionTitle">Aulas pendentes para finalizar</div><div class="mut">Estas aulas já passaram do horário e ainda não foram marcadas.</div><br>${lista.map(a=>`<div class="card"><div class="title">${alunoNome(a.aluno_id)}</div><div class="mut">${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)} · ${localAula(a)}</div><div class="actions"><button class="doneBtn" onclick="toggleAulaDada('${a.id}')">✓ Aula dada</button><button class="secondary" onclick="openRemarcar('${a.id}')">Alterar</button></div><button class="secondary" onclick="remarcando=aulas.find(x=>x.id==='${a.id}');marcarPendenteRemarcar()">Pendente p/ depois</button></div>`).join('')}<button class="secondary" onclick="closeModal()">Fechar</button>`)}

async function toggleAulaDada(id){const aula=aulas.find(x=>x.id===id);if(!aula)return;if(String(aula.data_aula)>hojeISO()&&aula.status!=='dada')return alert('Aulas futuras não podem ser marcadas como dadas. Use remarcar.');const novo=aula.status==='dada'?'pendente':'dada';await sb.from('aulas').update({status:novo,motivo:null}).eq('id',id);await carregarDados()}
function openRemarcar(id){remarcando=aulas.find(a=>a.id===id);if(!remarcando)return;modalHtml(`<div class="sectionTitle">Alterar aula</div><div class="mut">${alunoNome(remarcando.aluno_id)} — ${fmtData(remarcando.data_aula)} de ${String(remarcando.hora_inicio).slice(0,5)} às ${String(remarcando.hora_fim).slice(0,5)}</div><br><div class="grid"><button onclick="openFormRemarcar()">Remarcar dia/horário</button><button class="secondary" onclick="openFormPerdida()">Aula perdida cobrada</button></div><br><button class="secondary" onclick="marcarPendenteRemarcar()">Deixar pendente para decidir depois</button><br><br><button class="secondary" onclick="closeModal()">Cancelar</button>`)}
function openFormRemarcar(){if(!remarcando)return;modalHtml(`<div class="sectionTitle">Remarcar aula</div><div class="mut">${alunoNome(remarcando.aluno_id)} — ${fmtData(remarcando.data_aula)} de ${String(remarcando.hora_inicio).slice(0,5)} às ${String(remarcando.hora_fim).slice(0,5)}</div><br><div class="grid"><div class="field"><label>Novo dia</label><input type="date" id="novaData" value="${remarcando.data_aula}"></div><div class="field"><label>Novo horário</label><input type="time" id="novaHora" value="${String(remarcando.hora_inicio).slice(0,5)}"></div></div><div class="field"><label>Local da aula</label><input id="novoLocal" list="locaisLista" value="${localAula(remarcando)}"><datalist id="locaisLista">${locais.map(l=>`<option value="${l.nome}">`).join('')}</datalist></div><div class="field"><label>Motivo</label><textarea id="motivo" rows="3"></textarea></div><div class="actions"><button class="secondary" onclick="openRemarcar('${remarcando.id}')">Voltar</button><button onclick="confirmarRemarcacao()">Salvar remarcação</button></div>`)}
function openFormPerdida(){if(!remarcando)return;modalHtml(`<div class="sectionTitle">Aula perdida cobrada</div><div class="mut">A aula será cobrada mesmo sem ser dada, sem criar nova aula.</div><br><div class="field"><label>Motivo</label><textarea id="motivoPerdida" rows="3" placeholder="Ex: faltou em cima da hora"></textarea></div><div class="actions"><button class="secondary" onclick="openRemarcar('${remarcando.id}')">Voltar</button><button onclick="marcarAulaPerdida()">Confirmar</button></div>`)}
async function marcarAulaPerdida(){if(!remarcando)return;const motivo=document.getElementById('motivoPerdida')?.value.trim()||'Aula perdida cobrada';await sb.from('aulas').update({status:'perdida',motivo,remarcada_para_data:null,remarcada_para_hora:null}).eq('id',remarcando.id);closeModal();await carregarDados()}
async function marcarPendenteRemarcar(){if(!remarcando)return;await sb.from('aulas').update({status:'pendente_remarcar',motivo:'Pendente para decidir remarcação',remarcada_para_data:null,remarcada_para_hora:null}).eq('id',remarcando.id);closeModal();await carregarDados()}
async function confirmarRemarcacao(){if(!remarcando)return;const motivo=document.getElementById('motivo').value.trim()||'Sem motivo informado';const nd=document.getElementById('novaData').value,nh=document.getElementById('novaHora').value;const localId=await localIdPorNome(document.getElementById('novoLocal')?.value||localAula(remarcando));const mudouAgenda=nd!==remarcando.data_aula||nh!==String(remarcando.hora_inicio).slice(0,5);if(!mudouAgenda){await sb.from('aulas').update({local_id:localId}).eq('id',remarcando.id);closeModal();await carregarDados();alert('Local da aula alterado.');return}const conf=conflitoAulas([{data:nd,hora_inicio:nh}],remarcando.aluno_id,[remarcando.id]);if(conf)return alert(erroConflito(conf));await sb.from('aulas').update({status:'remarcada',motivo,remarcada_para_data:nd,remarcada_para_hora:nh}).eq('id',remarcando.id);await sb.from('aulas').insert({aluno_id:remarcando.aluno_id,data_aula:nd,hora_inicio:nh,hora_fim:addHour(nh),status:'pendente',local_id:localId});await sb.from('remarcacoes').insert({aula_id:remarcando.id,aluno_id:remarcando.aluno_id,data_original:remarcando.data_aula,hora_original:remarcando.hora_inicio,nova_data:nd,nova_hora:nh,motivo});closeModal();await carregarDados()}

function mostrarPopupRenovacoes(){if(alertaRenovacaoChecado)return;alertaRenovacaoChecado=true;const avisos=activeAlunos().map(a=>planoAtualAluno(a.id)).filter(pl=>pl.pagamento&&pl.faltamQtd===1);if(!avisos.length)return;modalHtml(`<div class="sectionTitle">Atenção para renovação</div><div class="infoList">${avisos.map(pl=>`• ${pl.aluno.nome}: resta apenas 1 aula para concluir o plano. Convém fazer a renovação.`).join('\n')}</div><br><div class="actions"><button class="secondary" onclick="closeModal()">Fechar</button><button onclick="closeModal();showTab('ajustes')">Ir para Renovar Plano</button></div>`)}
function fimMes(mes){const [y,m]=mes.split('-').map(Number);return new Date(Date.UTC(y,m,0,12)).toISOString().slice(0,10)}
function pagamentoValor(p){return p?`R$ ${Number(p.valor||0).toLocaleString('pt-BR')}`:'-' }
function planoAtualAluno(alunoId){
 const a=alunos.find(x=>x.id===alunoId)||{};
 const limite=fimMes(mesResumo);
 const ps=pagamentos.filter(p=>p.aluno_id===alunoId).sort((x,y)=>String(x.data_inicio_plano||x.data_vencimento).localeCompare(String(y.data_inicio_plano||y.data_vencimento)));
 const recebidos=ps.filter(p=>p.status==='recebido').sort((x,y)=>String(x.data_recebimento||x.data_vencimento).localeCompare(String(y.data_recebimento||y.data_vencimento)));
 const ultimoRegistrado=recebidos[recebidos.length-1]||null;
 const baseProximo=ultimoRegistrado?(ultimoRegistrado.data_vencimento||ultimoRegistrado.data_recebimento):'';
 const proximoPendente=ps.filter(p=>p.status!=='recebido'&&(!baseProximo||String(p.data_vencimento)>String(baseProximo))).sort((x,y)=>String(x.data_vencimento).localeCompare(String(y.data_vencimento)))[0]||null;
 let pagamento=[...ps].reverse().find(p=>String(p.data_inicio_plano||p.data_vencimento)<=limite)||ps[ps.length-1]||null;
 const inicio=pagamento?.data_inicio_plano||pagamento?.data_vencimento||mesResumo+'-01';
 const proximo=ps.find(p=>String(p.data_inicio_plano||p.data_vencimento)>String(inicio))||null;
 const fim=proximo?.data_inicio_plano||proximo?.data_vencimento||'9999-12-31';
 const planoQtd=Number(pagamento?.quantidade_aulas||a.quantidade_aulas_plano||8);
 const au=aulas.filter(x=>x.aluno_id===alunoId&&String(x.data_aula||'')>=String(inicio)&&String(x.data_aula||'')<String(fim)).sort((x,y)=>String(x.data_aula).localeCompare(String(y.data_aula))||String(x.hora_inicio).localeCompare(String(y.hora_inicio)));
 const feitas=au.filter(x=>x.status==='dada');
 const faltasRegistradas=au.filter(x=>x.status!=='dada');
 const faltamQtd=Math.max(0,planoQtd-feitas.length);
 const mes=inicio.slice(0,7);
 const tipo=pagamento?.tipo_cobranca==='aula'?'Avulso':'Pacote';
 return {aluno:a,pagamento,proximo,ultimoRegistrado,proximoPendente,mes,mesNome:`${tipo} iniciado em ${fmtData(inicio)}`,planoQtd,au,feitas,faltasRegistradas,faltamQtd,inicio,fim};
}
function diaSemanaExt(iso){const [y,m,d]=iso.split('-').map(Number);return new Intl.DateTimeFormat('pt-BR',{weekday:'long',timeZone:'UTC'}).format(new Date(Date.UTC(y,m-1,d,12)))}
function diaSemanaCurto(iso){return diaSemanaExt(iso).split('-')[0]}
function listaAulasDetalhe(list){return list.length?list.map(x=>`- ${fmtData(x.data_aula)} (${diaSemanaExt(x.data_aula)}) ${String(x.hora_inicio).slice(0,5)} — ${String(x.status).toUpperCase()}`).join('\n'):'Nenhuma aula registrada.'}
function diasSemanaAluno(pl){
 const map=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
 const ordem=[1,2,3,4,5,6,0];
 const diasAulas=[...new Set(pl.au.map(x=>new Date(`${x.data_aula}T12:00:00`).getDay()))];
 const dias=diasAulas.length?diasAulas:(pl.aluno.dias_semana||[]).map(Number);
 return ordem.filter(d=>dias.includes(d)).map(d=>map[d]).join(', ')||'Ainda não definido.';
}
function detalheAluno(id){const pl=planoAtualAluno(id);modalHtml(`<div class="sectionTitle">${pl.aluno.nome}</div><div class="infoList">Plano referência: ${pl.mesNome}\nPlano: ${pl.planoQtd} aulas\nÚltimo pagamento registrado: ${fmtData(pl.ultimoRegistrado?.data_recebimento||pl.ultimoRegistrado?.data_vencimento)||'-'} — ${pagamentoValor(pl.ultimoRegistrado)}\nFrequência: ${pl.aluno.frequencia_semanal||0}x semana\nDias: ${diasSemanaAluno(pl)}\nAulas dadas no plano: ${pl.feitas.length}\nAulas faltantes no plano: ${pl.faltamQtd}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function detalheResumo(id,tipo){const pl=planoAtualAluno(id);let titulo='',body='';
 if(tipo==='ultimo'){titulo='Último pagamento registrado';body=`Data: ${fmtData(pl.ultimoRegistrado?.data_recebimento||pl.ultimoRegistrado?.data_vencimento)||'-'}\nValor: ${pagamentoValor(pl.ultimoRegistrado)}\nStatus: ${pl.ultimoRegistrado?.status||'-'}`}
 if(tipo==='plano'){titulo='Dias do plano';body=`Plano referência: ${pl.mesNome}\nQuantidade contratada: ${pl.planoQtd} aulas\n\n${listaAulasDetalhe(pl.au)}`}
 if(tipo==='freq'){titulo='Frequência semanal';body=`${pl.aluno.frequencia_semanal||0}x semana\nDias da semana: ${diasSemanaAluno(pl)}`}
 if(tipo==='feitas'){titulo='Aulas já feitas';body=listaAulasDetalhe(pl.feitas)}
 if(tipo==='faltam'){titulo='Aulas que faltam';const faltas=pl.faltasRegistradas;body=(faltas.length?listaAulasDetalhe(faltas)+'\n':'')+(pl.faltamQtd>faltas.length?`\n${pl.faltamQtd-faltas.length} aula(s) ainda sem data definida neste plano.`:'')||'Nada faltando neste plano.'}
 if(tipo==='proximo'){titulo='Próximo pagamento pendente';body=`Data: ${fmtData(pl.proximoPendente?.data_vencimento)||'-'}\nValor: ${pagamentoValor(pl.proximoPendente)}\nStatus: ${pl.proximoPendente?.status||'-'}`}
 modalHtml(`<div class="sectionTitle">${titulo} — ${pl.aluno.nome}</div><div class="infoList">${body}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)
}

function renderAlunos(){const el=document.getElementById('alunos');const listaAlunos=activeAlunos();const mesNome=`${nomesMes[Number(mesResumo.slice(5))-1].toUpperCase()} ${mesResumo.slice(0,4)}`;el.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Resumo das alunas — ${mesNome}</div><div class="monthNav"><button class="secondary" onclick="mesResumo=monthAdd(mesResumo,-1);renderAlunos()">← Mês anterior</button><button class="secondary" onclick="mesResumo=monthAdd(mesResumo,1);renderAlunos()">Próximo mês →</button></div></div><div class="studentGrid compact">`+(listaAlunos.length?listaAlunos.map(a=>{const pl=planoAtualAluno(a.id);const feitas=pl.feitas.length;const faltam=pl.faltamQtd;return `<div class="card studentCard"><div class="title" onclick="detalheAluno('${a.id}')" style="cursor:pointer">${a.nome}</div><div class="mut">${a.locais?.nome||'A definir'} · ${pl.mesNome}</div><div class="compactStats"><div class="compactStat" onclick="detalheResumo('${a.id}','plano')"><span>Plano</span><b>${pl.planoQtd}</b></div><div class="compactStat" onclick="detalheResumo('${a.id}','feitas')"><span>Feitas</span><b>${feitas}</b></div><div class="compactStat" onclick="detalheResumo('${a.id}','faltam')"><span>Faltam</span><b>${faltam}</b></div><div class="compactStat" onclick="detalheResumo('${a.id}','freq')"><span>Freq.</span><b>${a.frequencia_semanal||0}x</b></div><div class="compactStat" onclick="detalheResumo('${a.id}','ultimo')"><span>Últ. pgto</span><b>${fmtData(pl.ultimoRegistrado?.data_recebimento||pl.ultimoRegistrado?.data_vencimento)||'-'}</b></div><div class="compactStat" onclick="detalheResumo('${a.id}','proximo')"><span>Próx.</span><b>${fmtData(pl.proximoPendente?.data_vencimento)||'-'}</b></div></div><div class="bar"><span style="width:${pl.planoQtd?Math.min(100,Math.round((feitas/pl.planoQtd)*100)):0}%"></span></div></div>`}).join(''):'<div class="card mut">Nenhuma aluna ativa.</div>')+`</div>`}
function aulasCalendarioMes(alunoId){return aulas.filter(a=>a.aluno_id===alunoId&&String(a.data_aula||'').startsWith(mesCalendario)&&(!calFiltros.length||calFiltros.includes(statusGrupo(a.status)))).sort((a,b)=>String(a.data_aula).localeCompare(String(b.data_aula))||String(a.hora_inicio).localeCompare(String(b.hora_inicio)))}
function relacaoCalendarioMes(alunoId){const lista=aulasCalendarioMes(alunoId);const filtro=calFiltros.length?` · filtro: ${calFiltros.map(f=>f==='dada'?'Dada':f==='remarcada'?'Remarcada/perdida':'Pendente').join(', ')}`:'';return `<div class="card reportCard"><div class="sectionTitle">Aulas do mês${filtro}</div><div class="infoList">${lista.length?lista.map(a=>`• ${fmtData(a.data_aula)} de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)} (${diaSemanaCurto(a.data_aula)}) — ${String(a.status).toUpperCase()}`).join('\n'):'Nenhuma aula encontrada para este filtro.'}</div></div>`}
function renderCalendario(){const el=document.getElementById('calendario');const ativos=activeAlunos();const cur=document.getElementById('selAluno')?.value||'';const atual=ativos.some(a=>a.id===cur)?cur:(ativos[0]?.id||'');el.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Calendário da aluna</div></div><div class="card"><label>Selecionar aluna</label><select id="selAluno" onchange="calFiltros=[];renderCalendario()">${ativos.map(a=>`<option value="${a.id}" ${atual===a.id?'selected':''}>${a.nome}</option>`).join('')}</select></div>${atual?`${calendarHtml({alunoId:atual,tipo:'student',mes:mesCalendario})}${relacaoCalendarioMes(atual)}`:'<div class="card mut">Nenhuma aluna ativa.</div>'}`}
function mesesRolagem(mes,limitados=null){if(limitados){const i=limitados.indexOf(mes);return limitados.filter((_,idx)=>Math.abs(idx-i)<=1)}return [monthAdd(mes,-1),mes,monthAdd(mes,1)]}
function monthPanelHtml({alunoId='',tipo='student',mes}){const [yy,mm]=mes.split('-').map(Number);const days=new Date(yy,mm,0).getDate();const first=new Date(`${mes}-01T12:00:00`).getDay();const names=['D','S','T','Q','Q','S','S'];let html=`<div class="monthPanel"><div class="calendarHead"><div class="title">${nomesMes[mm-1].toUpperCase()} ${yy}</div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${mes}-${String(d).padStart(2,'0')}`;let dots=[];if(tipo==='student'){dots=aulas.filter(a=>a.aluno_id===alunoId&&a.data_aula===date&&(!calFiltros.length||calFiltros.includes(statusGrupo(a.status)))).map(a=>statusCor(a.status))}else{dots=pagamentos.filter(p=>p.data_vencimento===date).map(p=>p.status==='recebido'?'green':'red')}html+=`<div class="day" onclick="${tipo==='student'?`clickDiaAluno('${date}','${alunoId}')`:`clickDiaFinanceiro('${date}')`}"><div class="dayNum">${d}</div><div class="dots">${dots.map(c=>`<span class="dot ${c}"></span>`).join('')}</div></div>`}return html+'</div></div>'}
function legendaFiltro(g,label,cor){const on=calFiltros.includes(g);return `<span class="pill" onclick="toggleCalFiltro('${g}')" style="cursor:pointer;${on?'border-color:var(--acc);color:var(--acc)':''}"><i class="dot ${cor}"></i>${label}</span>`}
function toggleCalFiltro(g){calFiltros=calFiltros.includes(g)?calFiltros.filter(x=>x!==g):[...calFiltros,g];renderCalendario()}
function calendarHtml({alunoId='',tipo='student',mes=mesCalendario}={}){const legenda=tipo==='finance'?'<span class="pill"><i class="dot green"></i>Recebido</span> <span class="pill"><i class="dot red"></i>A receber</span>':legendaFiltro('dada','Dada','green')+' '+legendaFiltro('remarcada','Remarcada/perdida','red')+' '+legendaFiltro('pendente','Pendente','blue');const id=tipo==='finance'?'financeScroll':'studentScroll';const meses=mesesRolagem(mes);setTimeout(()=>initMonthScroll(id,tipo),0);return `<div class="card"><div class="calendarHead"><div></div><div>${legenda}</div></div><div id="${id}" class="monthScroller">${meses.map(m=>monthPanelHtml({alunoId,tipo,mes:m})).join('')}</div></div>`}
function initMonthScroll(id,tipo){const el=document.getElementById(id);if(!el||el.dataset.ready)return;el.dataset.ready='1';const w=el.clientWidth;if(w&&el.children.length===3)el.scrollLeft=w;let t;el.addEventListener('scroll',()=>{clearTimeout(t);t=setTimeout(()=>finishMonthScroll(id,tipo),120)},{passive:true})}
function finishMonthScroll(id,tipo){const el=document.getElementById(id);if(!el)return;const w=el.clientWidth||1;const idx=Math.round(el.scrollLeft/w);if(idx===0){if(tipo==='finance'){mesFinanceiro=monthAdd(mesFinanceiro,-1);renderFinanceiro()}else{calFiltros=[];mesCalendario=monthAdd(mesCalendario,-1);renderCalendario()}}else if(idx===2){if(tipo==='finance'){mesFinanceiro=monthAdd(mesFinanceiro,1);renderFinanceiro()}else{calFiltros=[];mesCalendario=monthAdd(mesCalendario,1);renderCalendario()}}else{el.scrollTo({left:w,behavior:'smooth'})}}

function clickDiaAluno(date,alunoId){if(swipeMoved)return;const lista=aulas.filter(a=>a.aluno_id===alunoId&&a.data_aula===date);if(!lista.length)return;const pend=lista.find(a=>a.status==='pendente');if(pend){modalHtml(`<div class="sectionTitle">Aula pendente</div><div class="infoList">${alunoNome(pend.aluno_id)}\n${fmtData(pend.data_aula)} de ${String(pend.hora_inicio).slice(0,5)} às ${String(pend.hora_fim).slice(0,5)}</div><br><button onclick="closeModal();openRemarcar('${pend.id}')">Deseja alterar?</button><br><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}const red=lista.find(a=>a.status==='remarcada'||a.status==='perdida');if(red){modalHtml(`<div class="sectionTitle">Aula remarcada / falta</div><div class="infoList">Aluna: ${alunoNome(red.aluno_id)}\nData original: ${fmtData(red.data_aula)}\nMotivo: ${red.motivo||'Não informado'}\nRemarcada para: ${red.remarcada_para_data?fmtData(red.remarcada_para_data)+' '+String(red.remarcada_para_hora||'').slice(0,5):'Ainda não definida'}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`);return}modalHtml(`<div class="sectionTitle">Aula dada</div><div class="infoList">${lista.map(a=>`${alunoNome(a.aluno_id)} — ${fmtData(a.data_aula)} de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)}`).join('\n')}</div><br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function dinheiro(v){return `R$ ${Number(v||0).toLocaleString('pt-BR')}`}
function faturamentoMes(mes){return pagamentos.filter(p=>String(dataPrevistaPagamento(p)).startsWith(mes)).reduce((s,p)=>s+Number(p.valor||0),0)}
function crescimentoHtml(atual,anterior){if(!anterior&&!atual)return '<span class="growth neutral">0%</span>';if(!anterior)return '<span class="growth good">+100%</span>';const pct=((atual-anterior)/anterior)*100;const cls=pct<0?'bad':pct>0?'good':'neutral';const sinal=pct>0?'+':'';return `<span class="growth ${cls}">${sinal}${pct.toFixed(0).replace('.',',')}%</span>`}
function dataFinanceiro(p){return p.data_vencimento}
function pagamentosDoMes(mes=mesFinanceiro){return pagamentos.filter(p=>String(p.data_vencimento||'').startsWith(mes)).sort((a,b)=>String(dataFinanceiro(a)).localeCompare(String(dataFinanceiro(b)))||alunoNome(a.aluno_id).localeCompare(alunoNome(b.aluno_id)))}
function linhaPagamento(p,comBotao=true){const pago=p.status==='recebido';const info=pago?`Data a pagar: ${fmtData(p.data_vencimento)} · Pago em: ${fmtData(p.data_recebimento||p.data_vencimento)}`:`Data a pagar: ${fmtData(p.data_vencimento)}`;return `<div class="card payRow"><div><div class="title">${alunoNome(p.aluno_id)||'Aluna não identificada'}</div><div class="mut">${dinheiro(p.valor)} · ${info}</div></div>${comBotao?`<button class="${pago?'secondary':'doneBtn'}" onclick="openPagamento('${p.id}')">${pago?'Desfazer pagamento':'✓ Já pagou'}</button>`:`<span class="pill">${pago?'RECEBIDO':'A RECEBER'}</span>`}</div>`}
function renderFinanceiro(){const el=document.getElementById('financeiro');const rows=pagamentosDoMes();const recebidos=rows.filter(p=>p.status==='recebido');const pendentes=rows.filter(p=>p.status!=='recebido');const recebido=recebidos.reduce((s,p)=>s+Number(p.valor||0),0);const falta=pendentes.reduce((s,p)=>s+Number(p.valor||0),0);el.innerHTML=`<div class="calendarHead"><div class="sectionTitle">Financeiro — ${nomesMes[Number(mesFinanceiro.slice(5))-1].toUpperCase()} ${mesFinanceiro.slice(0,4)}</div></div><div class="studentGrid"><div class="card stat click" onclick="detalheFinanceiro('recebidos')"><div class="mut">Arrecadado no mês</div><div class="money good">${dinheiro(recebido)}</div><div class="mut">${recebidos.length} pagamento(s)</div></div><div class="card stat click" onclick="detalheFinanceiro('pendentes')"><div class="mut">Falta receber</div><div class="money warn">${dinheiro(falta)}</div><div class="mut">${pendentes.length} pagamento(s)</div></div><div class="card"><div class="mut">Previsão total</div><div class="money">${dinheiro(recebido+falta)}</div></div></div>${calendarHtml({tipo:'finance',mes:mesFinanceiro})}<div class="card"><div class="sectionTitle">Pagamentos do mês</div>${rows.length?rows.map(p=>linhaPagamento(p,true)).join(''):'<div class="mut">Nenhum pagamento previsto para este mês.</div>'}</div>`}
function detalheFinanceiro(tipo){const rows=pagamentosDoMes().filter(p=>tipo==='recebidos'?p.status==='recebido':p.status!=='recebido');const titulo=tipo==='recebidos'?'Arrecadado no mês':'Falta receber';modalHtml(`<div class="sectionTitle">${titulo}</div>${rows.length?rows.map(p=>linhaPagamento(p,true)).join(''):'<div class="mut">Nenhum registro.</div>'}<br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function clickDiaFinanceiro(date){if(swipeMoved)return;const rows=pagamentos.filter(p=>p.data_vencimento===date).sort((a,b)=>alunoNome(a.aluno_id).localeCompare(alunoNome(b.aluno_id)));if(!rows.length)return;modalHtml(`<div class="sectionTitle">Pagamentos de ${fmtData(date)}</div>${rows.map(p=>linhaPagamento(p,true)).join('')}<br><button class="secondary" onclick="closeModal()">Fechar</button>`)}
function openPagamento(id){const p=pagamentos.find(x=>x.id===id);if(!p)return;if(p.status==='recebido'){desfazerPagamento(id);return}modalHtml(`<div class="sectionTitle">Confirmar pagamento</div><div class="mut">${alunoNome(p.aluno_id)} · ${dinheiro(p.valor)}</div><br><div class="field"><label>Data em que realmente pagou</label><input id="dataPagamento" type="date" value="${p.data_vencimento||hojeISO()}"></div><div class="actions"><button class="secondary" onclick="closeModal();renderFinanceiro()">Cancelar</button><button onclick="confirmarPagamento('${id}')">Salvar pagamento</button></div>`)}
async function confirmarPagamento(id){const p=pagamentos.find(x=>x.id===id);if(!p)return;const data=document.getElementById('dataPagamento')?.value||p.data_vencimento||hojeISO();const r=await sb.from('pagamentos').update({status:'recebido',data_recebimento:data}).eq('id',id);if(r.error){alert('Erro ao atualizar pagamento.');return}await atualizarUltimoPagamentoAluno(p.aluno_id);closeModal();await carregarDados()}
async function desfazerPagamento(id){const p=pagamentos.find(x=>x.id===id);if(!p)return;const r=await sb.from('pagamentos').update({status:'pendente',data_recebimento:null}).eq('id',id);if(r.error){alert('Erro ao desfazer pagamento.');return}await atualizarUltimoPagamentoAluno(p.aluno_id,id);closeModal();await carregarDados()}
async function atualizarUltimoPagamentoAluno(alunoId,ignorarId=''){const {data}=await sb.from('pagamentos').select('id,data_recebimento,data_vencimento,status').eq('aluno_id',alunoId).eq('status','recebido');const ultimo=(data||[]).filter(p=>p.id!==ignorarId).sort((a,b)=>String(b.data_recebimento||b.data_vencimento).localeCompare(String(a.data_recebimento||a.data_vencimento)))[0];await sb.from('alunos').update({ultimo_pagamento:ultimo?(ultimo.data_recebimento||ultimo.data_vencimento):null}).eq('id',alunoId)}

function nomeDiaSemana(i){return ['domingo','segunda','terça','quarta','quinta','sexta','sábado'][Number(i)]||''}
function horarioDia(mapa,dia,base){return (mapa&&mapa[dia])||base||'07:00'}
function abrirHorarioDia(kind,dia){const prefix=kind==='cad'?'cad':kind==='aj'?'edit':'ed';const mapa=kind==='cad'?cadastroHoras:kind==='aj'?ajusteHoras:edHoras;const base=document.getElementById(prefix+(kind==='ed'?'Hora':'HoraInicio'))?.value||'07:00';const atual=horarioDia(mapa,dia,base);modalHtml(`<div class="sectionTitle">Horário de ${nomeDiaSemana(dia)}</div><div class="field"><label>Horário inicial</label><input id="horaDiaSemana" type="time" value="${atual}"></div><div class="actions"><button onclick="salvarHorarioDia('${kind}',${dia})">Salvar horário</button><button class="secondary" onclick="removerDiaSemana('${kind}',${dia})">Remover dia</button></div><br><button class="secondary" onclick="closeModal()">Cancelar</button>`)}
function salvarHorarioDia(kind,dia){const v=document.getElementById('horaDiaSemana')?.value||'07:00';if(kind==='cad')cadastroHoras[dia]=v;else if(kind==='aj')ajusteHoras[dia]=v;else edHoras[dia]=v;closeModal();if(kind==='cad')updateCadastroPreview();else if(kind==='aj')updateAjustePreview();else updateEditarPreview()}
function removerDiaSemana(kind,dia){const sel=kind==='cad'?'#cadWeekBtns':kind==='aj'?'#editWeekBtns':'#edWeekBtns';const btn=document.querySelector(`${sel} button[data-dia="${dia}"]`);if(btn)btn.classList.remove('on');closeModal();if(kind==='cad'){cadastroAjustes={};updateCadastroPreview()}else if(kind==='aj'){ajusteAjustes={};relatorioIndex=0;updateAjustePreview()}else updateEditarPreview()}
function toggleDiaHorario(kind,dia,btn){btn.classList.add('on');if(kind==='cad')cadastroAjustes={};if(kind==='aj'){ajusteAjustes={};relatorioIndex=0}abrirHorarioDia(kind,dia);if(kind==='cad')updateCadastroPreview();else if(kind==='aj')updateAjustePreview();else updateEditarPreview()}

function renderCadastro(){const el=document.getElementById('cadastro');el.innerHTML=`<div class="sectionTitle">Cadastrar aluna</div><div class="card"><div class="formGrid"><div class="field"><label>Aluna</label><input id="cadNome" placeholder="Nome da aluna" oninput="updateCadastroPreview()"></div><div class="field"><label>Primeiro dia do pacote</label><input id="cadPrimeiro" type="date" value="${hojeISO()}" onchange="cadastroAjustes={};mesCadastro=this.value.slice(0,7);updateCadastroPreview()"></div><div class="field"><label>Cobrança</label><select id="tipoCobranca" onchange="toggleCobranca();updateCadastroPreview()"><option value="aula">Pacote avulso</option><option value="pacote" selected>Pacote fechado</option></select></div><div class="field"><label>Horário inicial</label><input id="cadHoraInicio" type="time" value="07:00" onchange="updateCadastroPreview()"></div><div class="field cobrancaAula hidden"><label>Valor por aula</label><input id="cadValorAula" type="number" value="85" oninput="updateCadastroPreview()"></div><div class="field cobrancaAula hidden"><label>Quantidade de aulas avulsas</label><input id="cadQtdAvulso" type="number" value="1" oninput="cadastroAjustes={};updateCadastroPreview()"></div><div class="field cobrancaPacote"><label>Quantidade de aulas no pacote</label><select id="cadQtdPacote" onchange="setValorPacote();cadastroAjustes={};updateCadastroPreview()"><option value="8">8 aulas</option><option value="12" selected>12 aulas</option><option value="16">16 aulas</option></select></div><div class="field cobrancaPacote"><label>Valor do pacote</label><input id="cadValorPacote" type="number" value="960" oninput="updateCadastroPreview()"></div><div class="field"><label>Local</label><input id="cadLocal" value="A definir"></div></div><label>Quais dias na semana</label><div class="weekBtns" id="cadWeekBtns">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>`<button type="button" class="${[1,4].includes(i)?'on':''}" data-dia="${i}" onclick="toggleDiaHorario('cad',${i},this)">${d}</button>`).join('')}</div><br><button onclick="salvarAluno()">Cadastrar aluna e aulas</button></div><div id="cadPreview"></div>`;toggleCobranca();updateCadastroPreview()}
function setValorPacote(){const q=Number(document.getElementById('cadQtdPacote')?.value||12);const vals={8:640,12:960,16:1200};const el=document.getElementById('cadValorPacote');if(el)el.value=vals[q]||0}
function cadastroDias(){return [...document.querySelectorAll('#cadWeekBtns button.on')].map(b=>Number(b.dataset.dia))}
function gerarCadastroAulas(){const first=document.getElementById('cadPrimeiro')?.value||hojeISO();const tipo=document.getElementById('tipoCobranca')?.value||'pacote';const qtd=Number(tipo==='pacote'?document.getElementById('cadQtdPacote')?.value:document.getElementById('cadQtdAvulso')?.value)||1;let dias=cadastroDias();if(!dias.length){const [y,m,d]=first.split('-').map(Number);dias=[new Date(Date.UTC(y,m-1,d,12)).getUTCDay()]}const baseHi=document.getElementById('cadHoraInicio')?.value||'07:00';let out=[],dt=new Date(first+'T12:00:00'),guard=0;while(out.length<qtd&&guard<370){const iso=dt.toISOString().slice(0,10),dia=dt.getDay();if(dias.includes(dia)){const idx=out.length;const aj=cadastroAjustes[idx]||{};const hi=horarioDia(cadastroHoras,dia,baseHi);out.push({idx,original:iso,data:aj.data||iso,hora_inicio:aj.hora_inicio||hi,hora_fim:aj.hora_fim||addHour(hi),motivo:aj.motivo||''})}dt.setDate(dt.getDate()+1);guard++}return out.sort((a,b)=>a.data.localeCompare(b.data)||a.hora_inicio.localeCompare(b.hora_inicio))}
function updateCadastroPreview(){const el=document.getElementById('cadPreview');if(!el)return;const lista=gerarCadastroAulas();const tipo=document.getElementById('tipoCobranca')?.value||'pacote';const valor=tipo==='pacote'?Number(document.getElementById('cadValorPacote')?.value||0):lista.length*Number(document.getElementById('cadValorAula')?.value||85);el.innerHTML=`<div class="card"><div class="calendarHead"><div><div class="sectionTitle">Prévia das aulas</div><div class="mut">${lista.length} aulas · Total previsto: R$ ${valor.toLocaleString('pt-BR')} · Data a pagar: ${fmtData(lista[lista.length-1]?.data)}</div></div></div>${cadastroCalendarHtml(lista)}</div>`}
function mesesPlanoPermitidos(first,lista=[]){const meses=[...new Set((lista||[]).map(a=>String(a.data||'').slice(0,7)).filter(Boolean))].sort();return meses.length?meses:[(first||hojeISO()).slice(0,7)]}
function plannedPanelHtml({mes,lista,clickFn}){const [yy,mm]=mes.split('-').map(Number);const days=new Date(yy,mm,0).getDate();const first=new Date(`${mes}-01T12:00:00`).getDay();const names=['D','S','T','Q','Q','S','S'];let html=`<div class="monthPanel"><div class="calendarHead"><div class="title">${nomesMes[mm-1].toUpperCase()} ${yy}</div><div><span class="pill"><i class="dot blue"></i>Aula prevista</span></div></div><div class="cal">${names.map(n=>`<div class="dow">${n}</div>`).join('')}`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const date=`${mes}-${String(d).padStart(2,'0')}`;const aulasDia=lista.filter(a=>a.data===date);html+=`<div class="day" onclick="${clickFn}('${date}')"><div class="dayNum">${d}</div><div class="dots">${aulasDia.map(()=>`<span class="dot blue"></span>`).join('')}</div>${aulasDia.map(a=>`<div class="mut">${a.hora_inicio}</div>`).join('')}</div>`}return html+'</div></div>'}
function initLimitedScroll(id,kind,current,permitidos){const el=document.getElementById(id);if(!el||el.dataset.ready)return;el.dataset.ready='1';const w=el.clientWidth;const idx=Math.max(0,permitidos.indexOf(current));if(w)el.scrollLeft=w*idx;let t;el.addEventListener('scroll',()=>{clearTimeout(t);t=setTimeout(()=>finishLimitedScroll(id,kind,permitidos),120)},{passive:true})}
function finishLimitedScroll(id,kind,permitidos){const el=document.getElementById(id);if(!el)return;const w=el.clientWidth||1;const idx=Math.max(0,Math.min(permitidos.length-1,Math.round(el.scrollLeft/w)));if(kind==='cadastro'&&mesCadastro!==permitidos[idx]){mesCadastro=permitidos[idx];updateCadastroPreview()}if(kind==='ajuste'&&mesAjuste!==permitidos[idx]){mesAjuste=permitidos[idx];updateAjustePreview()}}
function cadastroCalendarHtml(lista){const permitidos=mesesPlanoPermitidos(document.getElementById('cadPrimeiro')?.value||hojeISO(),lista);if(!permitidos.includes(mesCadastro))mesCadastro=permitidos[0];setTimeout(()=>initLimitedScroll('cadastroScroll','cadastro',mesCadastro,permitidos),0);return `<div id="cadastroScroll" class="monthScroller">${permitidos.map(m=>plannedPanelHtml({mes:m,lista,clickFn:'clickCadastroDia'})).join('')}</div>`}

function ultimoPlanoDados(aluno){const p=planosAluno(aluno.id)[0]||null;const lista=aulasDoPlano(p);const dias=lista.length?[...new Set(lista.map(a=>new Date(`${a.data_aula}T12:00:00`).getDay()))]:(aluno.dias_semana||[]).map(Number);const refAula=lista.find(a=>a.status!=='remarcada')||lista[0]||{};const hora=(refAula.hora_inicio||'07:00').slice(0,5);const local=localAula(refAula.aluno_id?refAula:{aluno_id:aluno.id,local_id:aluno.local_id});const ultimoDia=lista[lista.length-1]?.data_aula||p?.data_fim_prevista||p?.data_vencimento||hojeISO();const tipo=p?.tipo_cobranca||aluno.tipo_cobranca||'pacote';const qtd=Number(p?.quantidade_aulas||aluno.quantidade_aulas_plano||12);const valorPacote=Number(p?.valor||aluno.valor_pacote||960);const valorAula=Number(aluno.valor_por_aula||85);return {p,lista,dias,hora,local,ultimoDia,tipo,qtd,valorPacote,valorAula}}
function primeiroDiaRenovacao(ultimoDia,dias){if(!dias.length)return addDays(ultimoDia,1);let d=addDays(ultimoDia,1),guard=0;while(guard<60){const [y,m,dd]=d.split('-').map(Number);if(dias.includes(new Date(Date.UTC(y,m-1,dd,12)).getUTCDay()))return d;d=addDays(d,1);guard++}return addDays(ultimoDia,1)}
function renderAjustes(){const el=document.getElementById('ajustes');const tinhaPreview=!!document.getElementById('editPreview');const ativos=activeAlunos();const cur=document.getElementById('editAluno')?.value||'';const atual=ativos.some(x=>x.id===cur)?cur:(ativos[0]?.id||'');const a=ativos.find(x=>x.id===atual)||{};const dados=a.id?ultimoPlanoDados(a):null;const prox=dados?primeiroDiaRenovacao(dados.ultimoDia,dados.dias):hojeISO();if(!tinhaPreview||!mesAjuste)mesAjuste=prox.slice(0,7);const qtds=[...new Set([8,12,16,dados?.qtd||12])].sort((x,y)=>x-y);el.innerHTML=`<div class="sectionTitle">Renovar plano</div><div class="card"><label>Selecionar aluna</label><select id="editAluno" onchange="ajusteAjustes={},relatorioIndex=0;mesAjuste='';renderAjustes()">${ativos.map(x=>`<option value="${x.id}" ${x.id===atual?'selected':''}>${x.nome}</option>`).join('')}</select></div>${a.id?`<div class="card"><div class="formBlock"><div class="blockTitle">Dados do novo plano</div><div class="formGrid"><div class="field"><label>Primeiro dia do novo plano</label><input id="editPrimeiro" type="date" value="${prox}" onchange="ajusteAjustes={},relatorioIndex=0;mesAjuste=this.value.slice(0,7);updateAjustePreview()"></div><div class="field"><label>Horário inicial</label><input id="editHoraInicio" type="time" value="${dados.hora}" onchange="updateAjustePreview()"></div><div class="field"><label>Local</label><input id="editLocal" list="editLocaisLista" value="${dados.local}"><datalist id="editLocaisLista">${locais.map(l=>`<option value="${l.nome}">`).join('')}</datalist></div><div class="field"><label>Cobrança</label><select id="editTipo" onchange="toggleEditCobranca();updateAjustePreview()"><option value="aula" ${dados.tipo==='aula'?'selected':''}>Pacote avulso</option><option value="pacote" ${dados.tipo!=='aula'?'selected':''}>Pacote fechado</option></select></div></div></div><div class="formBlock"><div class="blockTitle">Valores e quantidade</div><div class="formGrid"><div class="field ed function gerarAjusteAulas(){const first=document.getElementById('editPrimeiro')?.value||hojeISO();const tipo=document.getElementById('editTipo')?.value||'pacote';const qtd=Number(tipo==='pacote'?document.getElementById('editQtd')?.value:document.getElementById('editQtdAvulso')?.value)||1;let dias=editDias();if(!dias.length){const [y,m,d]=first.split('-').map(Number);dias=[new Date(Date.UTC(y,m-1,d,12)).getUTCDay()]}const baseHi=document.getElementById('editHoraInicio')?.value||'07:00';let out=[],dt=new Date(first+'T12:00:00'),guard=0;while(out.length<qtd&&guard<370){const iso=dt.toISOString().slice(0,10),dia=dt.getDay();if(dias.includes(dia)){const idx=out.length;const aj=ajusteAjustes[idx]||{};const hi=horarioDia(ajusteHoras,dia,baseHi);out.push({idx,original:iso,data:aj.data||iso,hora_inicio:aj.hora_inicio||hi,hora_fim:aj.hora_fim||addHour(hi),motivo:aj.motivo||''})}dt.setDate(dt.getDate()+1);guard++}return out.sort((a,b)=>a.data.localeCompare(b.data)||a.hora_inicio.localeCompare(b.hora_inicio))}

function toMin(h){const [hh,mm]=String(h||'00:00').slice(0,5).split(':').map(Number);return hh*60+mm}
function intervalOverlap(a,b){const as=toMin(a.hora_inicio),ae=as+60,bs=toMin(b.hora_inicio),be=bs+60;return as<be&&bs<ae}
function conflitoAulas(lista,alunoId,ignorarIds=[]){for(const n of lista){const a=aulas.find(x=>!ignorarIds.includes(x.id)&&x.aluno_id!==alunoId&&x.data_aula===n.data&&intervalOverlap({hora_inicio:n.hora_inicio},{hora_inicio:x.hora_inicio}));if(a)return {...n,conflitoAlunoId:a.aluno_id,conflitoHora:a.hora_inicio}}return null}

async function salvarAluno(){const nome=document.getElementById('cadNome').value.trim();if(!nome)return alert('Digite o nome da aluna.');const lista=gerarCadastroAulas();if(!lista.length)return alert('Monte pelo menos uma aula.');const localNome=document.getElementById('cadLocal').value.trim()||'A definir';let {data:loc}=await sb.from('locais').select('id').eq('nome',localNome).maybeSingle();if(!loc){const r=await sb.from('locais').insert({nome:localNome}).select('id').single();loc=r.data}const dias=cadastroDias();const tipo=document.getElementById('tipoCobranca').value;const qtd=tipo==='pacote'?Number(document.getElementById('cadQtdPacote').value):lista.length;const valor=tipo==='pacote'?Number(document.getElementById('cadValorPacote').value):lista.length*Number(document.getElementById('cadValorAula').value||85);const inicio=lista[0].data;const dataAPagar=lista[lista.length-1].data;const status=inicio>='2026-05-01'?'pendente':'recebido';const conf=conflitoAulas(lista,'');if(conf)return alert(erroConflito(conf));const ins=await sb.from('alunos').insert({nome,local_id:loc.id,frequencia_semanal:Math.max(1,dias.length),dias_semana:dias,primeiro_dia:inicio,tipo_cobranca:tipo,valor_por_aula:Number(document.getElementById('cadValorAula')?.value||85),quantidade_aulas_plano:qtd,valor_pacote:tipo==='pacote'?valor:null,data_primeiro_pagamento:dataAPagar,ultimo_pagamento:status==='recebido'?dataAPagar:null,ativo:true}).select('id').single();if(ins.error)return alert('Erro ao cadastrar aluna.');const alunoId=ins.data.id;await sb.from('pagamentos').insert({aluno_id:alunoId,data_vencimento:dataAPagar,data_recebimento:status==='recebido'?dataAPagar:null,valor,status,tipo_cobranca:tipo,quantidade_aulas:qtd,data_inicio_plano:inicio,data_fim_prevista:lista[lista.length-1].data,observacao:'Cadastrado pelo painel'});await sb.from('aulas').insert(lista.map(a=>({aluno_id:alunoId,data_aula:a.data,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:'pendente',motivo:a.motivo||null,local_i async function cadastrarNovoPlano(id){const aluno=alunos.find(a=>a.id===id);if(!aluno)return;const lista=gerarAjusteAulas();if(!lista.length)return alert('Monte pelo menos uma aula.');const tipo=document.getElementById('editTipo').value;const qtd=tipo==='pacote'?Number(document.getElementById('editQtd').value):lista.length;const valor=tipo==='pacote'?Number(document.getElementById('editValorPacote').value):lista.length*Number(document.getElementById('editValorAula').value||85);const dias=editDias();const localId=await localIdPorNome(document.getElementById('editLocal')?.value||'A definir');const inicio=lista[0].data;const dataAPagar=lista[lista.length-1].data;const status=inicio>='2026-05-01'?'pendente':'recebido';const conf=conflitoAulas(lista,id);if(conf)return alert(erroConflito(conf));await sb.from('alunos').update({frequencia_semanal:Math.max(1,dias.length),dias_semana:dias,tipo_cobranca:tipo,valor_por_aula:Number(document.getElementById('editValorAula')?.value||85),quantidade_aulas_plano:qtd,valor_pacote:tipo==='pacote'?valor:null,local_id:localId,data_primeiro_pagamento:dataAPagar,ultimo_pagamento:status==='recebido'?dataAPagar:aluno.ultimo_pagamento}).eq('id',id);await sb.from('pagamentos').insert({aluno_id:id,data_vencimento:dataAPagar,data_recebimento:status==='recebido'?dataAPagar:null,valor,status,tipo_cobranca:tipo,quantidade_aulas:qtd,data_inicio_plano:inicio,data_fim_prevista:lista[lista.length-1].data,observacao:'Novo plano cadastrado pelo painel'});await sb.from('aulas').insert(lista.map(a=>({aluno_id:id,data_aula:a.data,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:'pendente',motivo:a.motivo||null,local_id:localId})));ajusteAjustes={},relatorioIndex=0;await carregarDados();showTab('calendario');alert('Novo plano cadastrado.')}

function planosAluno(alunoId){return pagamentos.filter(p=>p.aluno_id===alunoId).sort((a,b)=>String(b.data_inicio_plano||b.data_vencimento).localeCompare(String(a.data_inicio_plano||a.data_vencimento)))}
function aulasDoPlano(p){if(!p)return[];const inicio=p.data_inicio_plano||p.data_vencimento;const fim=p.data_fim_prevista||'9999-12-31';return aulas.filter(a=>a.aluno_id===p.aluno_id&&String(a.data_aula)>=String(inicio)&&String(a.data_aula)<=String(fim)).sort((a,b)=>String(a.data_aula).localeCompare(String(b.data_aula))||String(a.hora_inicio).localeCompare(String(b.hora_inicio)))}

function pagamentosVencidos(){const hoje=hojeISO();return pagamentos.filter(p=>p.status!=='recebido'&&String(p.data_vencimento||'')<hoje).sort((a,b)=>String(a.data_vencimento).localeCompare(String(b.data_vencimento)))}

function edChecked(id){return !!document.getElementById(id)?.checked}
function renderEditarAluno(){const el=document.getElementById('editar');if(!el)return;const atual=document.getElementById('edAluno')?.value||alunos[0]?.id||'';const a=alunos.find(x=>x.id===atual)||{};const p=a.id?ultimoPlanoAluno(a.id):null;const plAulas=aulasDoPlano(p);const hora=(plAulas.find(x=>x.status!=='dada')?.hora_inicio||plAulas[0]?.hora_inicio||'07:00').slice(0,5);el.innerHTML=`<div class="sectionTitle">Editar aluna</div><div class="card"><label>Selecionar aluna</label><select id="edAluno" onchange="renderEditarAluno()">${alunos.map(x=>`<option value="${x.id}" ${x.id===atual?'selected':''}>${x.nome}</option>`).join('')}</select></div>${a.id?`<div class="card"><div class="grid"><label class="pill"><input id="edOptNome" type="checkbox" onchange="toggleEditarCampos();updateEditarPreview()" style="width:auto"> Alterar nome</label><label class="pill"><input id="edOptDias" type="checkbox" onchange="toggleEditarCampos();updateEditarPreview()" style="width:auto"> Alterar dias</label><label class="pill"><input id="edOptHora" type="checkbox" onchange="toggleEditarCampos();updateEditarPreview()" style="width:auto"> Alterar horário</label><label class="pill"><input id="edOptStatus" type="checkbox" onchange="toggleEditarCampos();updateEditarPreview()" style="width:auto"> Ativar/inativar</label></div><br><div class="formGrid"><div class="field edNomeBox"><label>Nome</label><input id="edNome" value="${a.nome||''}" oninput="updateEditarPreview()"></div><div class="field edHoraBox"><label>Horário inicial</label><input id="edHora" type="time" value="${hora}" onchange="updateEditarPreview()"></div><div class="field edAgendaBox"><label>Aplicar mudanças a partir de</label><input id="edApartir" type="date" value="${hojeISO()}" onchange="updateEditarPreview()"></div><div class="field edStatusBox"><label>Status da aluna</label><select id="edStatus" onchange="updateEditarPreview()"><option value="ativo" ${a.ativo!==false?'selected':''}>Ativo</option><option value="inativo" ${a.ativo===false?'selected':''}>Inativo</option></select></div></div><div class="edDiasBox"><label>Dias da semana <span id="edFreqAuto" class="mut">(${(a.dias_semana||[]).length||0}x semana)</span></label><div class="weekBtns" id="edWeekBtns">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>`<button type="button" class="${(a.dias_semana||[]).map(Number).includes(i)?'on':''}" data-dia="${i}" onclick="toggleDiaHorario('ed',${i},this)">${d}</button>`).join('')}</div></div><br><button onclick="salvarEdicaoAluno('${a.id}')">Salvar edição da aluna</button></div><div id="edPreview"></div>`:'<div class="card mut">Nenhuma aluna cadastrada.</div>'}`;toggleEditarCampos();updateEditarPreview()}
function toggleEditarCampos(){const nome=edChecked('edOptNome'),dias=edChecked('edOptDias'),hora=edChecked('edOptHora'),status=edChecked('edOptStatus'),agenda=dias||hora;document.querySelectorAll('.edNomeBox').forEach(e=>e.classList.toggle('hidden',!nome));document.querySelectorAll('.edDiasBox').forEach(e=>e.classList.toggle('hidden',!dias));document.querySelectorAll('.edHoraBox').forEach(e=>e.classList.toggle('hidden',!hora));document.querySelectorAll('.edStatusBox').forEach(e=>e.classList.toggle('hidden',!status));document.querySelectorAll('.edAgendaBox').forEach(e=>e.classList.toggle('hidden',!agenda))}
function gerarEdicaoAulas(){const alunoId=document.getElementById('edAluno')?.value;const p=ultimoPlanoAluno(alunoId);if(!p)return[];const lista=aulasDoPlano(p);const mudarDias=edChecked('edOptDias'),mudarHora=edChecked('edOptHora');if(!mudarDias&&!mudarHora)return lista.map(a=>({id:a.id,data:a.data_aula,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:a.status,old:true}));const apartir=document.getElementById('edApartir')?.value||hojeISO();const baseHi=mudarHora?(document.getElementById('edHora')?.value||'07:00'):(lista.find(a=>String(a.data_aula)>=String(apartir))?.hora_inicio||lista[0]?.hora_inicio||'07:00');if(mudarHora&&!mudarDias)return lista.map(a=>{const alterar=String(a.data_aula)>=String(apartir);const dia=new Date(`${a.data_aula}T12:00:00`).getDay();const hi=horarioDia(edHoras,dia,baseHi);return alterar?{id:a.id,data:a.data_aula,hora_inicio:hi,hora_fim:addHour(hi),status:a.status,old:true,changed:true}:{id:a.id,data:a.data_aula,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:a.status,old:true}}).sort((a,b)=>String(a.data).localeCompare(String(b.data))||String(a.hora_inicio).localeCompare(String(b.hora_inicio)));const preservadas=lista.filter(a=>String(a.data_aula)<String(apartir)||a.status==='dada');const faltam=Math.max(0,Number(p.quantidade_aulas||lista.length)-preservadas.length);const aluno=alunos.find(a=>a.id===alunoId)||{};const dias=mudarDias?editarDias():(aluno.dias_semana||[]).map(Number);let out=[...preservadas.map(a=>({id:a.id,data:a.data_aula,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:a.status,old:true}))];let dt=new Date(apartir+'T12:00:00'),guard=0;while(out.filter(x=>!x.old).length<faltam&&guard<370){const iso=dt.toISOString().slice(0,10);if(dias.includes(dt.getDay())){const hi=horarioDia(edHoras,dt.getDay(),baseHi);out.push({data:iso,hora_inicio:hi,hora_fim:addHour(hi),status:'pendente'})};dt.setDate(dt.getDate()+1);guard++}return out.sort((a,b)=>String(a.data).localeCompare(String(b.data))||String(a.hora_inicio).localeCompare(String(b.hora_inicio)))}
function updateEditarPreview(){const freqEl=document.getElementById('edFreqAuto');if(freqEl)freqEl.textContent=`(${Math.max(1,editarDias().length)}x semana)`;const el=document.getElementById('edPreview');if(!el)return;const lista=gerarEdicaoAulas();const agenda=edChecked('edOptDias')||edChecked('edOptHora');const alunoId=document.getElementById('edAluno')?.value;const aluno=alunos.find(a=>a.id===alunoId)||{};const nome=edChecked('edOptNome')?(document.getElementById('edNome')?.value||aluno.nome):aluno.nome;const st=edChecked('edOptStatus')?(document.getElementById('edStatus')?.value||'ativo'):(aluno.ativo===false?'inativo':'ativo');el.innerHTML=`<div class="card"><div class="sectionTitle">Como ficará o último plano</div><div class="mut">${nome||''} · ${st==='ativo'?'Ativo':'Inativo'}${agenda?' · Plano atualizado previamente para conferência.':' · Agenda não será alterada.'} ${lista.length?`· Data a pagar prevista: ${fmtData(lista[lista.length-1]?.data)}`:''}</div><div class="infoList">${lista.map(a=>`• ${fmtData(a.data)} de ${String(a.hora_inicio).slice(0,5)} às ${String(a.hora_fim).slice(0,5)} (${diaSemanaCurto(a.data)})${a.changed||!a.old?' · alterado':''}`).join('\n')||'Nenhuma aula no último plano.'}</div></div>`}
async function salvarEdicaoAluno(id){const aluno=alunos.find(a=>a.id===id);const p=ultimoPlanoAluno(id);if(!aluno)return alert('Aluna não encontrada.');const mudarNome=edChecked('edOptNome'),mudarDias=edChecked('edOptDias'),mudarHora=edChecked('edOptHora'),mudarStatus=edChecked('edOptStatus');if(!mudarNome&&!mudarDias&&!mudarHora&&!mudarStatus)return alert('Escolha o que deseja alterar.');if((mudarDias||mudarHora)&&!p)return alert('Esta aluna ainda não tem plano para editar horários.');const updateAluno={};if(mudarNome)updateAluno.nome=document.getElementById('edNome').value.trim();if(mudarDias){updateAluno.dias_semana=editarDias();updateAluno.frequencia_semanal=Math.max(1,updateAluno.dias_semana.length)}if(mudarStatus)updateAluno.ativo=document.getElementById('edStatus').value==='ativo';const lista=p?gerarEdicaoAulas():[];const agenda=mudarDias||mudarHora;if(agenda){const atualizadas=lista.filter(a=>a.changed&&a.id);const novas=lista.filter(a=>!a.old&&!a.id);const apagar=aulasDoPlano(p).filter(a=>!lista.find(x=>x.id===a.id)&&a.status!=='dada');const conf=conflitoAulas([...novas,...atualizadas],id,apagar.map(a=>a.id));if(conf)return alert(erroConflito(conf));if(Object.keys(updateAluno).length)await sb.from('alunos').update(updateAluno).eq('id',id);for(const a of atualizadas)await sb.from('aulas').update({hora_inicio:a.hora_inicio,hora_fim:a.hora_fim}).eq('id',a.id);if(apagar.length)await sb.from('aulas').delete().in('id',apagar.map(a=>a.id));if(novas.length)await sb.from('aulas').insert(novas.map(a=>({aluno_id:id,data_aula:a.data,hora_inicio:a.hora_inicio,hora_fim:a.hora_fim,status:'pendente',local_id:aluno.local_id||null})));const fim=lista[lista.length-1]?.data||p.data_fim_prevista;await sb.from('pagamentos').update({data_vencimento:fim,data_fim_prevista:fim}).eq('id',p.id)}else if(Object.keys(updateAluno).length){await sb.from('alunos').update(updateAluno).eq('id',id)}await carregarDados();showTab('editar');alert('Alteração salva.')}

checarSenha();carregarDados();
</script>
